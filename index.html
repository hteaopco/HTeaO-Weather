<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080e1a;--bg2:#0f1e3a;--border:rgba(56,189,248,0.15);
  --sky:#38bdf8;--sky-dim:rgba(56,189,248,0.18);--sky-border:rgba(56,189,248,0.4);
  --text:#e2e8f0;--muted:#64748b;--dim:#334155;
  --pos:#4ade80;--neg:#f87171;--neu:#94a3b8;
  --card:rgba(255,255,255,0.03);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:32px;scroll-padding-top:160px;}
.header{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo-name{font-size:17px;font-weight:800;color:var(--sky);letter-spacing:.12em;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:-2px;}
.tabs{display:flex;gap:8px;}
.tab{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--muted);font-family:inherit;letter-spacing:.04em;transition:all .2s;}
.tab.active{background:var(--sky-dim);color:var(--sky);border-color:var(--sky-border);}
.btn{background:var(--sky-dim);border:1px solid var(--sky-border);color:var(--sky);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.05em;display:inline-block;width:100%;text-align:center;box-sizing:border-box;}
.btn:active{opacity:.7;}
.btn-sm{padding:6px 12px;font-size:11px;background:transparent;border-color:rgba(255,255,255,0.1);color:var(--muted);}
.input{background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;max-width:100%;}
.label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:block;}
textarea.input{resize:vertical;font-family:'Menlo','Courier New',monospace;font-size:11px;line-height:1.6;}
.section{padding:14px 16px;}
.progress-wrap{text-align:center;padding:50px 20px;}
.progress-bar{background:rgba(255,255,255,0.05);border-radius:6px;height:7px;max-width:280px;margin:12px auto;overflow:hidden;}
.progress-fill{background:linear-gradient(90deg,#0ea5e9,#38bdf8);height:100%;border-radius:6px;transition:width .4s;}

/* 7-day summary blocks */
.week-block{border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(56,189,248,0.25);background:rgba(56,189,248,0.06);}
.week-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;}
.week-title{font-size:11px;font-weight:700;color:var(--sky);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.week-vals{display:flex;gap:16px;align-items:baseline;}
.week-sales{font-size:22px;font-weight:800;color:var(--text);}
.week-adj{font-size:14px;font-weight:700;}
.week-chevron{font-size:12px;color:var(--muted);flex-shrink:0;}
.week-body{border-top:1px solid rgba(56,189,248,0.15);}
.week-store-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04);}
.week-store-row:last-child{border-bottom:none;}
.week-store-name{font-size:12px;color:var(--text);font-weight:600;}
.week-store-right{text-align:right;}
.week-store-sales{font-size:13px;font-weight:700;color:var(--text);}
.week-store-adj{font-size:11px;font-weight:600;}

/* Divider */
.divider{height:1px;background:rgba(255,255,255,0.08);margin:14px 0;}

/* System average */
.sys-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.08);}
.sys-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}

.consol-sales{font-size:24px;font-weight:800;color:var(--text);}

.day-dt{font-size:12px;font-weight:700;color:var(--neu);margin-top:2px;}
.day-btn.sel .day-dt{color:var(--sky);}

.store-name{font-size:14px;font-weight:700;color:var(--text);}

.store-meta span{font-size:10px;color:var(--muted);}
.store-middle{flex:1;text-align:center;}
.store-sales-mid{font-size:14px;font-weight:700;color:var(--text);}
.store-right{text-align:right;flex-shrink:0;}
.expand-body{padding:0 14px 13px;border-top:1px solid rgba(255,255,255,0.06);}
.components{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.comp-card{background:rgba(0,0,0,0.25);border-radius:9px;padding:9px 8px;}
.comp-label{font-size:9px;color:var(--muted);margin-bottom:2px;}
.comp-val{font-size:14px;font-weight:800;}
.comp-sub{font-size:9px;color:var(--dim);margin-top:1px;}
.spark-bars{display:flex;gap:2px;align-items:flex-end;height:32px;margin-top:10px;}
.spark-bar{flex:1;border-radius:2px;cursor:pointer;}

/* Historical */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;}
.summary-label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.summary-val{font-size:20px;font-weight:800;}

.totals{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:12px;padding:14px;margin-top:8px;}
.tr{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.tr:first-child{margin-top:0;}
.empty{text-align:center;padding:50px 20px;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-text{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px;}
.err-card{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#fca5a5;}

// Dynamic weekly base: Monthly Budget / (days in month / 7)

const C2F=c=>c*9/5+32;

function cloudTier(p){
  if(p<=20)return{n:"Clear",   a:0};
  if(p<=50)return{n:"Partly",  a:-0.04};
  if(p<=80)return{n:"Mostly",  a:-0.19};
  return       {n:"Overcast",a:-0.35};
}
function rainTier(mm){
  const i=(mm||0)/25.4;
  if(i<=0)  return{n:"None",    a:0};
  if(i<0.25)return{n:"Light",   a:-0.10};
  if(i<0.75)return{n:"Moderate",a:-0.15};
  return       {n:"Heavy",   a:-0.20};
}

// ── DOW lookup helper ──────────────────────────────────────────────────────
// DOW array: [Sun, Mon, Tue, Wed, Thu, Fri, Sat] = indices 0-6
// JS getDay() = 0=Sun, 1=Mon ... 6=Sat — maps directly, no remapping needed
function getDOW(storeId, jsDay){ const v=(DOW[storeId]||[])[jsDay]; return(v==null||v===undefined)?0:v; }

// ── Store hours ─────────────────────────────────────────────────────────────
// Mon-Fri: 6am-8pm | Sat: 7am-8pm | Sun: 11am-8pm
function getHours(dateStr){
  const dow=new Date(dateStr+"T12:00:00").getDay(); // 0=Sun
  if(dow===0) return {amS:11,amE:12,pmS:12,pmE:20,amWt:0.05,pmWt:0.95};
  if(dow===6) return {amS:7, amE:12,pmS:12,pmE:20,amWt:0.20,pmWt:0.80};
  return            {amS:6, amE:12,pmS:12,pmE:20,amWt:0.20,pmWt:0.80};
}
function hAvg(arr,s,e){const v=(arr||[]).slice(s,e).filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function hSum(arr,s,e){return(arr||[]).slice(s,e).reduce((a,b)=>a+(b||0),0);}

// Hourly-aware calc — uses AM/PM split when hourly arrays provided
// Falls back to daily avg calc() when hourly data unavailable
function calcHourly(sid,tArr,clArr,prArr,dateStr){
  const mo=new Date(dateStr+"T12:00:00").getMonth();
  const base=NORMALS[STATION[sid]][mo];
  const te=sid==="011"?0:0.01;
  const h=getHours(dateStr);

  function block(tF,cl,raIn){
    if(tF==null)return{t:0,c:0,r:0,tot:0,cN:"—",rN:"—"};
    const tFf=C2F(tF);
    const tA=te*(tFf-base);
    const cT=cloudTier(cl||0);
    const rT=rainTier(raIn||0);
    return{t:tA*100,c:cT.a*100,r:rT.a*100,
           tot:(0.4*tA+0.5*cT.a+0.1*rT.a)*100,cN:cT.n,rN:rT.n};
  }

  const amT=hAvg(tArr,h.amS,h.amE);
  const amCl=hAvg(clArr,h.amS,h.amE);
  // precip from hourly is already mm per hour, sum over block
  const amRaIn=hSum(prArr,h.amS,h.amE)/25.4;

  const pmT=hAvg(tArr,h.pmS,h.pmE);
  const pmCl=hAvg(clArr,h.pmS,h.pmE);
  const pmRaIn=hSum(prArr,h.pmS,h.pmE)/25.4;

  const am=block(amT,amCl,amRaIn);
  const pm=block(pmT,pmCl,pmRaIn);

  const total=am.tot*h.amWt+pm.tot*h.pmWt;
  const tAdj=am.t*h.amWt+pm.t*h.pmWt;
  const cAdj=am.c*h.amWt+pm.c*h.pmWt;
  const rAdj=am.r*h.amWt+pm.r*h.pmWt;

  // Use PM values for display labels (more representative)
  return{total,tAdj,cAdj,rAdj,
         dev:C2F(pmT!=null?pmT:20)-base,base,
         cN:pm.cN,rN:pm.rN,
         amTF:pmT!=null?C2F(amT||pmT):null,
         pmTF:pmT!=null?C2F(pmT):null};
}

function calc(sid,tF,cl,ra,dateStr){
  const mo=new Date(dateStr+"T12:00:00").getMonth();
  const base=NORMALS[STATION[sid]][mo];
  const te=sid==="011"?0:0.01;
  const tA=te*(tF-base);
  const cT=cloudTier(cl||0),rT=rainTier(ra||0);
  return{
    total:(0.4*tA+0.5*cT.a+0.1*rT.a)*100,
    tAdj:tA*100,cAdj:cT.a*100,rAdj:rT.a*100,
    dev:tF-base,base,cN:cT.n,rN:rT.n
  };
}

// Get projected daily sales for a store on a given day
function projectedDailySales(store, dateStr, weatherAdj){
  const jsDay=new Date(dateStr+"T12:00:00").getDay();
  const dowW=getDOW(store.id,jsDay);
  if(!dowW)return null;
  const weeklyBase=getWeeklyBase(store.id, dateStr);
  const dailyBase=weeklyBase*(dowW/100);
  return dailyBase*(1+weatherAdj/100);
}

function parseSales(txt){
  // Returns {byStore, byDate} where byDate={dateStr:{storeId:sales}}
  const byStore={};
  const byDate={};
  (txt||"").trim().split("\n").forEach(l=>{
    const p=l.split("\t");if(p.length<3)return;
    const mm=p[1]&&p[1].trim().match(/^(\d+)/);if(!mm)return;
    const id=String(parseInt(mm[1])).padStart(3,"0");
    const v=parseFloat(p[2]);if(isNaN(v))return;
    // Parse date from col 0 (format: M-D-YYYY or YYYY-MM-DD)
    const rawDate=p[0].trim();
    let dateKey=rawDate;
    const mdY=rawDate.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
    if(mdY) dateKey=`${mdY[3]}-${mdY[1].padStart(2,'0')}-${mdY[2].padStart(2,'0')}`;
    if(!byDate[dateKey]) byDate[dateKey]={};
    byDate[dateKey][id]=v;
    byStore[id]=v; // keep last date's value for single-day use
  });
  return {byStore, byDate};
}
function wkly(actual,sid,dow,wadj){
  const w=getDOW(sid,dow);
  if(!w)return null;
  return(actual/(1+wadj/100))/(w/100);
}

function fetchStore(store){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${store.lat}&longitude=${store.lon}`+
    `&hourly=temperature_2m,cloudcover,precipitation`+
    `&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum,cloudcover_mean`+
    `&temperature_unit=celsius&timezone=${encodeURIComponent(store.tz)}&forecast_days=14`;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),15000));
  return Promise.race([fetch(url).then(r=>r.json()),timeout]);
}
function fetchArchive(store,date){
  const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${store.lat}&longitude=${store.lon}`+
    `&start_date=${date}&end_date=${date}`+
    `&hourly=temperature_2m,cloudcover,precipitation`+
    `&daily=temperature_2m_mean,precipitation_sum,cloudcover_mean`+
    `&timezone=${encodeURIComponent(store.tz)}`;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),15000));
  return Promise.race([fetch(url).then(r=>r.json()),timeout]);
}

          // Slice hourly arrays for this specific day (24 hrs per day)
          const h=d.hourly;
          const off=di*24;
          const tArr=h&&h.temperature_2m?h.temperature_2m.slice(off,off+24):null;

      try{

        const cld=d.daily.cloudcover_mean&&d.daily.cloudcover_mean[0]!=null?d.daily.cloudcover_mean[0]:0;
        const rad=d.daily.precipitation_sum&&d.daily.precipitation_sum[0]!=null?d.daily.precipitation_sum[0]:0;
        const adj=(tArr&&tArr.length)?
          calcHourly(s.id,tArr,clArr,prArr,date):
          calc(s.id,tFd,cld,rad,date);
        const actual=salesMap[s.id];
        return{store:s,actual,adj,dowW:getDOW(s.id,jsDay),weekly:wkly(actual,s.id,jsDay,adj.total)};
      }catch(e){return{store:s,actual:salesMap[s.id],error:"Parse: "+e.message};}
    });
    const totA=out.reduce((a,r)=>a+(r.actual||0),0);
    const totW=out.reduce((a,r)=>a+(r.weekly||0),0);
    const adjRows=out.filter(r=>r.adj);
    const avgW=adjRows.length?adjRows.reduce((a,r)=>a+r.adj.total,0)/adjRows.length:0;

    // Compute today's consolidated DOW weekly and weather-normalized weekly
    const todayDOW=out.filter(r=>r.dowW&&!r.error).reduce((sum,r)=>sum+(r.actual/(r.dowW/100)),0);
    const todayWthrNorm=out.filter(r=>r.adj&&r.dowW&&!r.error).reduce((sum,r)=>{
      const dw=r.actual/(r.dowW/100);
      return sum+(dw/(1+r.adj.total/100));
    },0);
    // Per-store dynamic weekly base for rolling avg
    const getStoreDynBase=(sid)=>getWeeklyBase(sid,date);

    // ── L7: fetch weather for all 7 days, compute actual vs weather-normalized ──
    let rolling7=null;
    try{
      const dateKeys=Object.keys(salesByDate).sort();
      if(dateKeys.length>0){
        // Build list of all dates to fetch (pasted dates + fill back to 7 days)
        const allDates=[];
        for(let i=6;i>=0;i--){
          const d=new Date(date+"T12:00:00");
          d.setDate(d.getDate()-i);
          allDates.push(d.toISOString().split("T")[0]);
        }
        // Fetch weather for all stores × all 7 days in parallel
        const weatherByDate={};
        await Promise.all(allDates.map(async dt=>{
          const promises=STORES.map(s=>fetchArchive(s,dt).catch(()=>null));
          const results=await Promise.all(promises);
          weatherByDate[dt]={};
          STORES.forEach((s,i)=>{ weatherByDate[dt][s.id]=results[i]; });
        }));
        // Compute L7 actual and weather-normalized for each day
        let l7Actual=0, l7WthrNorm=0, daysUsed=0;
        allDates.forEach(dt=>{
          const dayMap=salesByDate[dt];
          if(!dayMap) return; // no sales data for this day
          const jsDay=new Date(dt+"T12:00:00").getDay();
          let dayActual=0, dayNorm=0, storeCount=0;
          STORES.forEach(s=>{
            const act=dayMap[s.id];
            if(act==null||act<=0) return;
            const wData=weatherByDate[dt]&&weatherByDate[dt][s.id];
            let adj=null;
            if(wData&&!wData.error){
              const h=wData.hourly;
              const tArr=h&&h.temperature_2m&&h.temperature_2m.length?h.temperature_2m:null;
              const clArr=h&&h.cloudcover&&h.cloudcover.length?h.cloudcover:null;
              const prArr=h&&h.precipitation&&h.precipitation.length?h.precipitation:null;
              const tFd=wData.daily&&wData.daily.temperature_2m_mean&&wData.daily.temperature_2m_mean[0]!=null?wData.daily.temperature_2m_mean[0]:20;
              const cld=wData.daily&&wData.daily.cloudcover_mean&&wData.daily.cloudcover_mean[0]!=null?wData.daily.cloudcover_mean[0]:0;
              const rad=wData.daily&&wData.daily.precipitation_sum&&wData.daily.precipitation_sum[0]!=null?wData.daily.precipitation_sum[0]:0;
              adj=(tArr&&tArr.length)?calcHourly(s.id,tArr,clArr,prArr,dt):calc(s.id,C2F(tFd),cld,rad,dt);
            }
            dayActual+=act;
            // Weather-normalize: actual / (1 + weatherAdj/100)
            const norm=adj?act/(1+adj.total/100):act;
            dayNorm+=norm;
            storeCount++;
          });
          if(storeCount>0){
            l7Actual+=dayActual;
            l7WthrNorm+=dayNorm;
            daysUsed++;
          }
        });
        if(daysUsed>0){
          const wthrImpact=l7Actual-l7WthrNorm;
          rolling7={l7Actual,l7WthrNorm,wthrImpact,daysUsed};
        }
      }
    }catch(e){rolling7=null;}

    HIST={rows:out,totA,totW,avgW,dayName:DNF[jsDay],date,rolling7};
  }catch(e){HIST={error:"Failed: "+e.message};}
  LOADING=false;render();
}

// Draw YOY chart after render
function drawYOYChart(){
  if(MODE!=='yoy') return;
  const chartId='yoy-canvas-'+YOY_SEL;
  const canvas=document.getElementById(chartId);
  if(!canvas) return;

  const d=YOY_DATA[YOY_SEL];
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth;
  const H=canvas.offsetHeight;
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  ctx.scale(dpr,dpr);

  // X range
  const todayDoyX=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
  let xMin,xMax;
  if(YOY_RANGE===3){
    xMin=Math.max(1, todayDoyX-45);
    xMax=Math.min(365, todayDoyX+45);
  } else if(YOY_RANGE===6){
    xMin=1;
    xMax=Math.min(365, todayDoyX+90);
  } else {
    xMin=1; xMax=365;
  }

  function filterRange(pts){ return pts.filter(p=>p[0]>=xMin&&p[0]<=xMax); }

  // Y scale — round to nearest 25k or 50k increment
  const filteredVals=[
    ...filterRange(d.yoy),...filterRange(d.act),...filterRange(d.bud)
  ].map(p=>p[1]).filter(v=>v!=null);
  const rawMax=filteredVals.length>0?Math.max(...filteredVals):1000;
  // Pick increment based on scale:
  // Consolidated: 50k increments
  // Store level: 2.5k increments
  const isConsolidated=(YOY_SEL==='consolidated');
  let inc;
  if(isConsolidated){
    inc=rawMax<200000?25000:50000;
  } else {
    inc=2500;
  }
  const yMax=Math.ceil(rawMax*1.15/inc)*inc;
  const yMin=0;

  // Padding — enough room for y-axis labels on the LEFT outside the chart
  const PAD={top:14,right:12,bottom:30,left:58};
  const cw=W-PAD.left-PAD.right;
  const ch=H-PAD.top-PAD.bottom;

  function xp(doy){return PAD.left+((doy-xMin)/(xMax-xMin))*cw;}
  function yp(v){return PAD.top+ch-(v-yMin)/(yMax-yMin)*ch;}

  // Grid lines + Y labels (outside chart area, left of PAD.left)
  const yTicks=Math.round(yMax/inc);
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=0.5;
  for(let i=0;i<=yTicks;i++){
    const v=i*inc;
    const y=yp(v);
    // Grid line spans full chart width
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cw,y);ctx.stroke();
    // Label left of chart
    ctx.fillStyle='rgba(255,255,255,0.38)';
    ctx.font=`9px -apple-system,sans-serif`;
    ctx.textAlign='right';
    const kv=v/1000;
    const label=v>=1000?'$'+kv.toFixed(1)+'k':'$0';
    ctx.fillText(label,PAD.left-5,y+3);
  }

  // Month labels on x-axis
  const months=['J','F','M','A','M','J','J','A','S','O','N','D'];
  const mDoys=[1,32,60,91,121,152,182,213,244,274,305,335];
  ctx.fillStyle='rgba(255,255,255,0.38)';
  ctx.font='9px -apple-system,sans-serif';
  ctx.textAlign='center';
  mDoys.forEach((doy,i)=>{
    if(doy>=xMin&&doy<=xMax)
      ctx.fillText(months[i],xp(doy),H-PAD.bottom+12);
  });

  // Today vertical line
  const todayDoy=todayDoyX;
  if(todayDoy>=xMin&&todayDoy<=xMax){
    ctx.strokeStyle='rgba(255,255,255,0.18)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(xp(todayDoy),PAD.top);ctx.lineTo(xp(todayDoy),PAD.top+ch);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Smooth curve helper
  function smoothLine(ctx,pts,tension=0.4){
    if(pts.length<2) return;
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)];
      const p1=pts[i];
      const p2=pts[i+1];
      const p3=pts[Math.min(pts.length-1,i+2)];
      const cp1x=p1[0]+(p2[0]-p0[0])*tension;
      const cp1y=p1[1]+(p2[1]-p0[1])*tension;
      const cp2x=p2[0]-(p3[0]-p1[0])*tension;
      const cp2y=p2[1]-(p3[1]-p1[1])*tension;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);
    }
  }

  // 2025 YOY — 25% opacity fill (more transparent)
  const yoy=filterRange(d.yoy).filter(p=>p[1]!=null);
  if(yoy.length>1){
    const pts=yoy.map(p=>[xp(p[0]),yp(p[1])]);
    ctx.beginPath();
    smoothLine(ctx,pts,0.5);
    ctx.lineTo(xp(yoy[yoy.length-1][0]),yp(yMin));
    ctx.lineTo(xp(yoy[0][0]),yp(yMin));
    ctx.closePath();
    ctx.fillStyle='rgba(56,189,248,0.10)';  // 25% more transparent
    ctx.fill();
    ctx.beginPath();
    smoothLine(ctx,pts);
    ctx.strokeStyle='rgba(56,189,248,0.35)';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // Budget dotted line
  const bud=filterRange(d.bud).filter(p=>p[1]!=null);
  if(bud.length>1){
    const pts=bud.map(p=>[xp(p[0]),yp(p[1])]);
    ctx.beginPath();
    ctx.setLineDash([4,3]);
    ctx.strokeStyle='rgba(200,200,200,0.45)';
    ctx.lineWidth=1.5;
    smoothLine(ctx,pts);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 2026 Actual red line — with glow effect
  const act=filterRange(d.act).filter(p=>p[1]!=null);
  if(act.length>1){
    const pts=act.map(p=>[xp(p[0]),yp(p[1])]);
    // Outer glow — wide, soft
    ctx.beginPath();
    ctx.strokeStyle='rgba(192,57,43,0.18)';
    ctx.lineWidth=8;
    ctx.lineJoin='round';
    ctx.lineCap='round';
    smoothLine(ctx,pts);
    ctx.stroke();
    // Inner glow
    ctx.beginPath();
    ctx.strokeStyle='rgba(220,80,60,0.35)';
    ctx.lineWidth=4;
    smoothLine(ctx,pts);
    ctx.stroke();
    // Core line
    ctx.beginPath();
    ctx.strokeStyle='#e8503a';
    ctx.lineWidth=2.2;
    smoothLine(ctx,pts);
    ctx.stroke();
    // Pulsing end dot — store pulse state on canvas element
    const last=act[act.length-1];
    const cx=xp(last[0]), cy=yp(last[1]);
    if(!canvas._pulseStart) canvas._pulseStart=performance.now();
    const elapsed=(performance.now()-canvas._pulseStart)/1000;
    const pulse=0.5+0.5*Math.sin(elapsed*2.5); // 0..1 oscillation
    const pulseR=5+pulse*7;   // radius 5..12
    const pulseA=0.35*(1-pulse); // fades out as it expands
    // Outer pulse ring
    ctx.beginPath();
    ctx.arc(cx,cy,pulseR,0,Math.PI*2);
    ctx.strokeStyle=`rgba(232,80,58,${pulseA})`;
    ctx.lineWidth=1.5;
    ctx.stroke();
    // Core dot
    ctx.beginPath();
    ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='#e8503a';
    ctx.fill();
    // Inner glow ring
    ctx.beginPath();
    ctx.arc(cx,cy,6.5,0,Math.PI*2);
    ctx.fillStyle='rgba(232,80,58,0.22)';
    ctx.fill();
    // Schedule next frame to keep pulsing
    requestAnimationFrame(()=>{if(MODE==='yoy')drawYOYChart();});
  }
}

// ── Compute 7-day summaries ────────────────────────────────────────────────
function compute7DaySummary(startIdx, endIdx){
  if(!FC||!FC.dates)return null;
  const dates=FC.dates.slice(startIdx,endIdx);
  if(!dates.length)return null;

  // Per store: sum projected sales, avg weather adj
  const storeRows=STORES.map(store=>{
    const days=FC.stores[store.id];
    if(!days||days.error)return{store,sales:null,avgAdj:null,error:true};
    let totalSales=0,totalAdj=0,count=0;
    for(let i=startIdx;i<endIdx&&i<FC.dates.length;i++){
      const day=days[i];
      if(!day)continue;
      totalSales+=(day.sales||0);
      totalAdj+=day.adj.total;
      count++;
    }
    return{store,sales:totalSales,avgAdj:count?totalAdj/count:0,count};
  }).filter(r=>!r.error);

  const totalSales=storeRows.reduce((a,r)=>a+(r.sales||0),0);
  const avgAdj=storeRows.length?storeRows.reduce((a,r)=>a+(r.avgAdj||0),0)/storeRows.length:0;
  return{storeRows,totalSales,avgAdj,dates};
}


// ── Render Budget ──────────────────────────────────────────────────────────
function rbud(){
  const co=YTD_CUTOFF;
  const coDate=new Date(co+"T12:00:00");
  if(typeof BUD_MODE==="undefined") window.BUD_MODE="as-is";

  const rows=STORES.map(s=>{
    const act=YTD_ACTUAL[s.id]||0;
    const bud=getYTDBudget(s.id,co);
    const storm=STORM_IMPACT[s.id]||0;
    const displayAct=BUD_MODE==="storm"?act+storm:act;
    const varD=displayAct-bud;
    const varP=bud?varD/bud*100:0;
    const fyFcst=getFullYearForecast(s.id,co,BUD_MODE==="storm");
    const fyBud=getFullYearBudget(s.id);
    const fyVarD=fyFcst-fyBud;
    const fyVarP=fyBud?fyVarD/fyBud*100:0;
    const region=WEST_TX.has(s.id)?"West TX":"Midwest";
    return{s,act,bud,storm,displayAct,varD,varP,fyFcst,fyBud,fyVarD,fyVarP,region};
  });

  function regionSum(filter){
    const f=rows.filter(filter);
    return{
      act:f.reduce((a,r)=>a+r.displayAct,0),
      bud:f.reduce((a,r)=>a+r.bud,0),
      storm:f.reduce((a,r)=>a+r.storm,0),

      fyBud:f.reduce((a,r)=>a+r.fyBud,0),

            <div class="comp-card"><div class="comp-label">FY Budget</div><div class="comp-val" style="font-size:12px">${fc$(r.fyBud)}</div></div>
            <div class="comp-card"><div class="comp-label">FY Δ $</div><div class="comp-val" style="font-size:12px;color:${vc(r.fyVarP)}">${fcd$(r.fyVarD)}</div></div>
            <div class="comp-card"><div class="comp-label">FY Δ %</div><div class="comp-val" style="font-size:12px;color:${vc(r.fyVarP)}">${pctStr(r.fyVarP)}</div></div>
            ${BUD_MODE==="as-is"?`<div class="comp-card" style="grid-column:span 3;background:rgba(165,180,252,0.08)"><div class="comp-label" style="color:#a5b4fc">⛈ Storm (excl.)</div><div class="comp-val" style="font-size:12px;color:#a5b4fc">+${fc$(r.storm)}</div></div>`:""}
          </div>
        </div>`:""}
      </div>`).join("");
  }

  // ── CONSOLIDATED: always visible, arrow toggles store list ─────────────
  const toggle_html=`<div style="display:flex;gap:8px;margin:10px 0 6px">
          <button onclick="window.BUD_MODE='as-is';render();" style="flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;box-sizing:border-box;border:1px solid ${BUD_MODE==="as-is"?"rgba(56,189,248,0.5)":"rgba(255,255,255,0.1)"};background:${BUD_MODE==="as-is"?"rgba(56,189,248,0.18)":"transparent"};color:${BUD_MODE==="as-is"?"#38bdf8":"#64748b"}">As-Is</button>
          <button onclick="window.BUD_MODE='storm';render();" style="flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;box-sizing:border-box;border:1px solid ${BUD_MODE==="storm"?"rgba(165,180,252,0.5)":"rgba(255,255,255,0.1)"};background:${BUD_MODE==="storm"?"rgba(165,180,252,0.15)":"transparent"};color:${BUD_MODE==="storm"?"#a5b4fc":"#64748b"}">⛈ Storm Adjusted</button>
        </div>`;
  const consolStores = EX["bud_all"];
  const consolBlock=`<div style="border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(56,189,248,0.3)">
    <div style="padding:14px 16px;background:rgba(56,189,248,0.06)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--sky);letter-spacing:.1em;text-transform:uppercase">Consolidated</div>
        <button onclick="tog('bud_all')" style="background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);color:#38bdf8;border-radius:6px;padding:4px 12px;font-size:11px;font-family:inherit;cursor:pointer">${consolStores?"▲ Hide Stores":"▼ All Stores"}</button>
      </div>
      ${metricsGrid(all)}
    </div>
    ${consolStores?`<div style="border-top:1px solid rgba(255,255,255,0.07)">${storeList(()=>true)}</div>`:""}
  </div>`;

  // ── REGION: label only → metrics → metrics+stores ──────────────────────
  function regionBlock(label, data, key, regionFilter){
    const state=EX[key]||0;
    // state 0: label only
    // state 1: label + metrics
    // state 2: label + metrics + stores
    const varD=data.act-data.bud;
    const varP=data.bud?varD/data.bud*100:0;

    if(state===0){
      return`<div style="border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)">

  return`<div class="section">

    ${consolBlock}

  </div>`;
}

// ── Render Forecast ────────────────────────────────────────────────────────
function rfx(){
  if(LOADING)return`<div class="section"><div class="progress-wrap">
    <div style="font-size:13px;color:var(--sky);margin-bottom:8px">Fetching forecast for all 20 stores…</div>
    <div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Parallel fetch · Open-Meteo</div>
  </div></div>`;

  if(!FC)return`<div class="section"><div class="empty">
    <div class="empty-icon">🌤</div>
    <div class="empty-text">14-day forecast for all 20 stores<br>with weather demand adjustments</div>
    <button class="btn" onclick="runForecast()">▶ Load 14-Day Forecast</button>
  </div></div>`;

  if(FC.error)return`<div class="section"><div class="err-card">Error: ${FC.error}</div>
    <button class="btn" onclick="runForecast()" style="margin-top:12px">↻ Retry</button></div>`;

  const dates=FC.dates||[];
  if(!dates.length)return`<div class="section"><div class="err-card">No dates returned.</div>
    <button class="btn" onclick="runForecast()" style="margin-top:12px">↻ Retry</button></div>`;

  // ── 7-day summaries ──
  const next7=compute7DaySummary(0,7);
  const following7=compute7DaySummary(7,14);

  function render7Block(summary, title, key){
    if(!summary)return"";
    const open=EX[key];
    const storeList=open?`<div class="week-body">
      ${summary.storeRows.sort((a,b)=>parseInt(a.store.num)-parseInt(b.store.num)).map(r=>`
        <div class="week-store-row">
          <div class="week-store-name">${r.store.num} - ${r.store.name}</div>
          <div class="week-store-right">
            <div class="week-store-sales">${f$(r.sales)}</div>
            <div class="week-store-adj" style="color:${ac(r.avgAdj)}">${fp(r.avgAdj)}</div>
          </div>
        </div>`).join("")}
    </div>`:"";
    return`<div class="week-block">
      <div class="week-header" onclick="tog('${key}')">
        <div>
          <div class="week-title">${title}</div>
          <div class="week-vals">
            <div class="week-sales">${f$(summary.totalSales)}</div>
            <div class="week-adj" style="color:${ac(summary.avgAdj)}">${fp(summary.avgAdj)}</div>
          </div>
          <div style="font-size:9px;color:var(--muted);margin-top:3px">${summary.dates[0]} → ${summary.dates[summary.dates.length-1]}</div>
        </div>
        <div class="week-chevron">${open?"▲":"▼"}</div>
      </div>${storeList}
    </div>`;
  }

  // ── Selected day: consolidated bar ──
  const dayAdjs=STORES.map(s=>{
    const days=FC.stores[s.id];
    return(days&&!days.error&&days[SEL])?days[SEL].adj.total:null;
  }).filter(v=>v!=null);
  const sysAvg=dayAdjs.length?dayAdjs.reduce((a,b)=>a+b,0)/dayAdjs.length:0;
  const totalDaySales=STORES.reduce((sum,s)=>{
    const days=FC.stores[s.id];
    return sum+((days&&!days.error&&days[SEL]&&days[SEL].sales)?days[SEL].sales:0);
  },0);
  const best=dayAdjs.length?Math.max(...dayAdjs):0;
  const worst=dayAdjs.length?Math.min(...dayAdjs):0;
  const bStore=STORES.find(s=>{const d=FC.stores[s.id];return d&&!d.error&&d[SEL]&&d[SEL].adj.total===best;});
  const wStore=STORES.find(s=>{const d=FC.stores[s.id];return d&&!d.error&&d[SEL]&&d[SEL].adj.total===worst;});
  const sd=new Date(dates[SEL]+"T12:00:00");

  // ── Day strip ──
  let ds=`<div class="day-scroll"><div class="day-strip">`;
  dates.forEach((dt,i)=>{
    const d=new Date(dt+"T12:00:00");
    const sel=i===SEL?"sel":"";
    const lbl=i===0?"Today":DN[d.getDay()];
    ds+=`<button class="day-btn ${sel}" onclick="setDay(${i})"><div class="day-lbl">${lbl}</div><div class="day-dt">${MN[d.getMonth()]} ${d.getDate()}</div></button>`;
  });
  ds+=`</div></div>`;

  // ── Consolidated bar ──
  const consol=`<div class="consol-bar">
    <div>
      <div class="consol-label">📊 Consolidated · ${DN[sd.getDay()]} ${MN[sd.getMonth()]} ${sd.getDate()}</div>
      <div class="consol-sales">${f$(totalDaySales)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:9px;color:var(--muted);margin-bottom:3px">Avg Weather Adj</div>
      <div class="consol-adj" style="color:${ac(sysAvg)}">${fp(sysAvg)}</div>
    </div>
  </div>`;

  // ── System avg ──
  const sys=`<div class="sys-card" style="background:${ab(sysAvg)}">
    <div style="font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">Store Detail · ${DN[sd.getDay()]} ${MN[sd.getMonth()]} ${sd.getDate()}</div>
    <div class="sys-grid">
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Sys Avg Adj</div><div style="font-size:18px;font-weight:800;color:${ac(sysAvg)}">${fp(sysAvg)}</div></div>
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Best</div><div style="font-size:14px;font-weight:800;color:#4ade80">${fp(best)}</div><div style="font-size:10px;color:var(--muted)">${bStore?bStore.num+" - "+bStore.name:""}</div></div>
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Worst</div><div style="font-size:14px;font-weight:800;color:#f87171">${fp(worst)}</div><div style="font-size:10px;color:var(--muted)">${wStore?wStore.num+" - "+wStore.name:""}</div></div>
    </div>
  </div>`;

  // ── Store cards ──
  const sorted=[...STORES].sort((a,b)=>parseInt(a.num)-parseInt(b.num));

  let cards="";
  sorted.forEach(s=>{
    const days=FC.stores[s.id];
    if(!days){cards+=`<div class="err-card">${s.num} - ${s.name}: not loaded</div>`;return;}
    if(days.error){cards+=`<div class="err-card">${s.num} - ${s.name}: ${days.error}</div>`;return;}
    const day=days[SEL];if(!day)return;
    const adj=day.adj;
    const key=`f${s.id}`;const open=EX[key];
    let sparks="";
    days.forEach((d,i)=>{
      const v=d&&d.adj?d.adj.total:0;
      const h=Math.max(4,Math.min(32,16+v*1.5));
      sparks+=`<div class="spark-bar" style="height:${h}px;background:${ac(v)};opacity:${i===SEL?1:0.45}" onclick="setDay(${i})"></div>`;
    });
    const exp=open?`<div class="expand-body">
      <div class="components">
        <div class="comp-card"><div class="comp-label">🌡 Temp 40%</div><div class="comp-val" style="color:${ac(adj.tAdj)}">${fp(adj.tAdj)}</div><div class="comp-sub">${Math.round(day.tF)}°F vs ${Math.round(adj.base)}°F</div></div>
        <div class="comp-card"><div class="comp-label">☁️ Cloud 50%</div><div class="comp-val" style="color:${ac(adj.cAdj)}">${fp(adj.cAdj)}</div><div class="comp-sub">${Math.round(day.cl)}% · ${adj.cN}</div></div>
        <div class="comp-card"><div class="comp-label">🌧 Rain 10%</div><div class="comp-val" style="color:${ac(adj.rAdj)}">${fp(adj.rAdj)}</div><div class="comp-sub">${adj.rN}</div></div>
      </div>
      <div style="margin-top:10px"><div style="font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">14-Day Trend</div>
        <div class="spark-bars">${sparks}</div>
        <div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:8px;color:var(--dim)">Today</span><span style="font-size:8px;color:var(--dim)">+14d</span></div>
      </div>
    </div>`:"";

    cards+=`<div class="store-card" style="background:${ab(adj.total)}">
      <div class="store-header" onclick="tog('${key}')">
        <div class="store-left">
          <div class="store-name">${s.num} - ${s.name}</div>
          <div class="store-meta">
            <span>${Math.round(day.tMin||day.tF-5)}–${Math.round(day.tMax||day.tF+5)}°F</span>
            <span>${adj.cN}</span>
            ${adj.rN!=="None"?`<span style="color:#93c5fd">${adj.rN}</span>`:""}
          </div>
        </div>
        <div class="store-middle">
          <div class="store-sales-mid">${f$(day.sales)}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:2px">proj sales</div>
        </div>
        <div class="store-right">
          <div style="font-size:20px;font-weight:800;color:${ac(adj.total)}">${fp(adj.total)}</div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">${open?"▲":"▼"}</div>
        </div>
      </div>${exp}</div>`;
  });

  return`<div class="section">
    ${render7Block(next7,"📅 Next 7 Days (Days 1–7)","w1")}
    ${render7Block(following7,"📅 Following 7 Days (Days 8–14)","w2")}
    <div class="divider"></div>
    ${ds}
    ${consol}
    ${sys}
    <div style="height:1px;background:rgba(255,255,255,0.08);margin:4px 0 12px"></div>
  <button onclick="EX['fc_all']=!EX['fc_all'];render();" style="width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-sizing:border-box;border:1px solid rgba(255,255,255,0.12);background:${EX['fc_all']?'rgba(56,189,248,0.15)':'rgba(255,255,255,0.04)'};color:${EX['fc_all']?'#38bdf8':'#94a3b8'};margin-bottom:10px">${EX['fc_all']?'▲ Collapse All Stores':'▼ Expand All Stores'}</button>
  ${EX['fc_all']?cards:''}

  </div>`;
}

// ── Render Historical ──────────────────────────────────────────────────────
function rhi(){
  let h=`<div class="section">`;
  
  if(SHOW_IN){
    h+=`<div style="margin-bottom:10px">
      <label class="label">Date</label>
      <input type="date" class="input" id="hist-date" value="${SAVED_DATE}" style="margin-bottom:8px;width:calc(100%);max-width:100%;-webkit-appearance:none;appearance:none">
      <button class="btn" onclick="runHistorical()" style="display:block">▶ Run Data</button>
    </div>`;
  }else if(!LOADING){
    h+=`<button class="btn" onclick="runHistorical()" style="margin-bottom:12px">▶ Run Model for ${SAVED_DATE}</button>`;
  }
  if(LOADING){
    h+=`<div class="progress-wrap">
      <div style="font-size:13px;color:var(--sky);margin-bottom:8px">Fetching weather data…</div>
      <div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">Fetching weather for 7 days × 20 stores…</div>
    </div>`;
  }
  if(HIST&&!LOADING){
    if(HIST.error)return h+`<div class="err-card">${HIST.error}</div></div>`;
    // Compute consolidated DOW weekly and weather-adjusted weekly
    const consolDOWWeekly = HIST.rows.filter(r=>r.dowW&&!r.error).reduce((sum,r)=>{
      // DOW-only weekly = actual / (dowW/100)
      return sum + (r.actual / (r.dowW/100));
    },0);
    const budgetWeeklyBase = getConsolidatedBase(HIST.date);
    // Weather-adjusted weekly = DOW weekly / (1 + weatherAdj/100)
    // If weather helped (positive adj), we divide down to get true baseline
    // If weather hurt (negative adj), we divide up
    const consolWeatherAdjWeekly = HIST.rows.filter(r=>r.adj&&r.dowW&&!r.error).reduce((sum,r)=>{
      const dowWeekly = r.actual / (r.dowW/100);
      return sum + (dowWeekly / (1 + r.adj.total/100));
    },0);
    const wthrDiff = consolWeatherAdjWeekly - consolDOWWeekly;

    h+=`<div class="summary-grid">

      <div class="summary-card">
        <div class="summary-label">Avg Weather Adj</div>
        <div class="summary-val" style="color:${ac(HIST.avgW)}">${fp(HIST.avgW)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Actual Sales</div>
        <div class="summary-val" style="font-size:16px">${f$(HIST.totA)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Consolidated DOW Weekly</div>
        <div class="summary-val" style="font-size:16px;color:var(--sky)">${f$(consolDOWWeekly)}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:3px">Today's DOW · no weather</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Weather-Normalized Weekly</div>
        <div class="summary-val" style="font-size:16px;color:${ac(wthrDiff>0?1:-1)}">${f$(consolWeatherAdjWeekly)}</div>
        <div style="font-size:9px;color:${ac(wthrDiff>0?3:-3)};margin-top:3px">${wthrDiff>=0?'+':''}${f$(wthrDiff)} wthr impact</div>
      </div>
      <div class="summary-card" style="grid-column:span 2;background:rgba(56,189,248,0.06);border-color:rgba(56,189,248,0.2)">
        <div class="summary-label" style="color:var(--sky)">📅 Last 7 Days</div>
        ${HIST.rolling7?`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px">
          <div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:3px">L7 Actual</div>
            <div style="font-size:16px;font-weight:800">${f$(HIST.rolling7.l7Actual)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:3px">Weather Normalized</div>
            <div style="font-size:16px;font-weight:800;color:var(--sky)">${f$(HIST.rolling7.l7WthrNorm)}</div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:3px">Wthr $ Impact</div>
            <div style="font-size:16px;font-weight:800;color:${ac(HIST.rolling7.wthrImpact)}">${HIST.rolling7.wthrImpact>=0?'+':''}${f$(HIST.rolling7.wthrImpact)}</div>
          </div>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:6px">${HIST.rolling7.daysUsed} days with sales data · weather fetched per store</div>`
        :`<div style="font-size:12px;color:var(--muted);margin-top:6px">Fetching weather for 7 days…</div>`}
      </div>
      <div class="summary-card" style="grid-column:span 2;background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.25)">
        <div class="summary-label" style="color:#a5b4fc">📋 Budget Weekly Base (${MN[new Date(HIST.date+"T12:00:00").getMonth()]})</div>
        <div style="margin-top:6px">
          <div style="font-size:9px;color:var(--muted);margin-bottom:3px">Consolidated</div>
          <div style="font-size:18px;font-weight:800;color:#a5b4fc">${f$(budgetWeeklyBase)}</div>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:4px">Monthly budget ÷ (days in month ÷ 7) · ties to monthly budget table</div>
      </div>
    </div>

        </div>
        <div class="weekly-banner">
          <div><div style="font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">Implied Weekly</div><div style="font-size:9px;color:var(--dim);margin-top:2px">weather-normalized</div></div>

      </div>`:(open&&r.error?`<div class="expand-body" style="color:#fca5a5;font-size:12px">Error: ${r.error}</div>`:"");
      storeListHtml+=`<div class="store-card" style="background:${ab(w?w.total:null)}">
        <div class="store-header" onclick="tog('${key}')">
          <div class="store-left">
            <div class="store-name">${r.store.num} - ${r.store.name}</div>

              <span>DOW ${r.dowW!=null?r.dowW.toFixed(2):"—"}%</span>
              ${w?`<span style="color:${ac(w.total)};font-weight:600">Wthr ${fp(w.total)}</span>`:""}
              ${r.error?`<span style="color:#fca5a5">⚠ ${r.error}</span>`:""}
            </div>
          </div>
          <div class="store-middle">
            <div class="store-sales-mid">${f$(r.actual)}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">actual</div>
          </div>
          <div class="store-right">
            ${r.dowW?`<div style="font-size:12px;color:var(--sky)">${f$(r.actual/(r.dowW/100))}/wk</div>`:""}
            <div style="font-size:9px;color:var(--muted);margin-top:1px">DOW only</div>
            <div style="font-size:12px;color:var(--dim);margin-top:4px">${open?"▲":"▼"}</div>
          </div>
        </div>${exp}</div>`;
    });
    // totals appended after storeListHtml
    const totalsHtml=`<div class="totals">
      <div class="tr"><span style="font-size:12px;color:var(--muted)">Total Actual Sales</span><span style="font-size:14px;font-weight:700">${f$(HIST.totA)}</span></div>
      <div class="tr"><span style="font-size:12px;color:var(--muted)">Total Implied Weekly</span><span style="font-size:17px;font-weight:800;color:var(--sky)">${f$(HIST.totW)}</span></div>
    </div>`;
    storeListHtml += totalsHtml;
    // Now append expand button + store list to h
    h += `<button onclick="EX['hist_all']=!EX['hist_all'];render();" style="width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-sizing:border-box;border:1px solid rgba(255,255,255,0.12);background:${EX['hist_all']?'rgba(56,189,248,0.15)':'rgba(255,255,255,0.04)'};color:${EX['hist_all']?'#38bdf8':'#94a3b8'};margin-bottom:10px">${EX['hist_all']?'▲ Collapse All Stores':'▼ Expand All Stores'}</button>`;
    if(EX['hist_all']) h += storeListHtml;
  }
  return h+`</div>`;
}

function getYTDBudget(storeId, cutoffStr){
  const co=new Date(cutoffStr+"T12:00:00");
  const mo=co.getMonth(); // 0-indexed
  let total=0;
  for(let m=0;m<mo;m++) total+=MONTHLY_BUDGET[storeId][m];
  total+=MONTHLY_BUDGET[storeId][mo]*(co.getDate()/DAYS_IN_MONTH[mo]);
  return total;
}
function getRemainingBudget(storeId, cutoffStr){
  const co=new Date(cutoffStr+"T12:00:00");
  const mo=co.getMonth();
  let total=0;
  const daysRemaining=DAYS_IN_MONTH[mo]-co.getDate();
  total+=MONTHLY_BUDGET[storeId][mo]*(daysRemaining/DAYS_IN_MONTH[mo]);
  for(let m=mo+1;m<12;m++) total+=MONTHLY_BUDGET[storeId][m];
  return total;
}
function getFullYearBudget(storeId){
  return MONTHLY_BUDGET[storeId].reduce((a,b)=>a+b,0);
}
// Full year forecast: project YTD tracking rate × remaining budget
// stormAdj=true adds storm impact to YTD actual before projecting
function getFullYearForecast(storeId, cutoffStr, stormAdj){
  const ytdAct=(YTD_ACTUAL[storeId]||0)+(stormAdj?(STORM_IMPACT[storeId]||0):0);
  const ytdBud=getYTDBudget(storeId,cutoffStr);
  const remBud=getRemainingBudget(storeId,cutoffStr);
  if(!ytdBud) return ytdAct+remBud;
  const rate=ytdAct/ytdBud;
  return ytdAct+(remBud*rate);
}
