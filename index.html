.btn-sm{padding:6px 12px;font-size:11px;background:transparent;border-color:rgba(255,255,255,0.1);color:var(--muted);}

.progress-fill{background:linear-gradient(90deg,#0ea5e9,#38bdf8);height:100%;border-radius:6px;transition:width .4s;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;}
.summary-label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.summary-val{font-size:20px;font-weight:800;}
.store-card{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);}

.store-right{text-align:right;flex-shrink:0;}
.expand-body{padding:0 14px 13px;border-top:1px solid rgba(255,255,255,0.06);}
.components{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;}
.comp-card{background:rgba(0,0,0,0.25);border-radius:9px;padding:9px 8px;}

.sys-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.day-scroll{overflow-x:auto;padding-bottom:8px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-strip{display:flex;gap:6px;min-width:max-content;}

const AVG_DOW=[14.72,12.98,12.98,12.98,12.98,15.71,17.67];
const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DNF=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const C2F=c=>c*9/5+32;
function cloudTier(p){
  if(p<=20)return{n:"Clear",   a:0};
  if(p<=50)return{n:"Partly",  a:-0.04};
  if(p<=80)return{n:"Mostly",  a:-0.19};
  return       {n:"Overcast",a:-0.35};
}
function rainTier(mm){
  const i=(mm||0)/25.4;
  if(i<=0)  return{n:"None",    a:0};
  if(i<0.25)return{n:"Light",   a:-0.10};
  if(i<0.75)return{n:"Moderate",a:-0.15};
  return       {n:"Heavy",   a:-0.20};
}
function calc(sid,tF,cl,ra){
  const mo=new Date().getMonth();
  const base=NORMALS[STATION[sid]][mo];
  const te=sid==="011"?0:0.01;
  const tA=te*(tF-base);
  const cT=cloudTier(cl||0),rT=rainTier(ra||0);
  return{
    total:(0.4*tA+0.5*cT.a+0.1*rT.a)*100,
    tAdj:tA*100,cAdj:cT.a*100,rAdj:rT.a*100,
    dev:tF-base,base,cN:cT.n,rN:rT.n
  };
}
function wkly(actual,sid,dow,wadj){
  const w=DOW[sid][dow];
  if(!w)return null;
  return(actual/(1+wadj/100))/(w/100);
}
const f$=v=>v==null?"—":"$"+Math.round(v).toLocaleString();
const fp=(v,p=true)=>v==null?"—":`${p&&v>0?"+":""}${v.toFixed(1)}%`;
function ac(v){
  if(v==null)return"#94a3b8";
  return v>4?"#4ade80":v>1?"#86efac":v>-1?"#94a3b8":v>-4?"#fca5a5":"#f87171";
}
function ab(v){

  return v>2?"rgba(74,222,128,0.12)":v>0?"rgba(134,239,172,0.07)":
         v>-2?"var(--card)":v>-4?"rgba(252,165,165,0.10)":"rgba(248,113,113,0.15)";
}
function parseSales(txt){
  const m={};
  (txt||"").trim().split("\n").forEach(l=>{
    const p=l.split("\t");if(p.length<3)return;
    const mm=p[1]&&p[1].trim().match(/^(\d+)/);if(!mm)return;
    const id=String(parseInt(mm[1])).padStart(3,"0");
    const v=parseFloat(p[2]);if(!isNaN(v))m[id]=v;
  });
  return m;
}

// ── Fetch helpers ──────────────────────────────────────────────────────────
function fetchStore(store){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${store.lat}&longitude=${store.lon}`+
    `&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum,cloudcover_mean`+
    `&temperature_unit=celsius&timezone=${encodeURIComponent(store.tz)}&forecast_days=14`;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),15000));
  return Promise.race([fetch(url).then(r=>r.json()),timeout]);
}
function fetchArchive(store,date){
  const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${store.lat}&longitude=${store.lon}`+
    `&start_date=${date}&end_date=${date}`+
    `&daily=temperature_2m_mean,precipitation_sum,cloudcover_mean`+
    `&timezone=${encodeURIComponent(store.tz)}`;
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),15000));
  return Promise.race([fetch(url).then(r=>r.json()),timeout]);
}

// ── Run forecast: fetch ALL stores in parallel ─────────────────────────────
async function runForecast(){
  LOADING=true;FC=null;render();
  try{
    // Fetch all 20 stores simultaneously
    const promises=STORES.map(s=>fetchStore(s).catch(e=>({error:e.message,id:s.id})));
    const raw=await Promise.all(promises);
    
    // Find a valid dates array from any successful response
    let dates=null;
    for(const d of raw){if(d&&d.daily&&d.daily.time){dates=d.daily.time;break;}}
    if(!dates){
      // Generate dates manually as fallback
      dates=[];
      const now=new Date();
      for(let i=0;i<14;i++){
        const d=new Date(now);d.setDate(d.getDate()+i);
        dates.push(d.toISOString().split("T")[0]);
      }
    }
    
    const stores={};
    STORES.forEach((s,i)=>{
      const d=raw[i];
      if(!d||d.error||!d.daily){
        stores[s.id]={error:d&&d.error?d.error:"No data"};
        return;
      }
      try{
        stores[s.id]=d.daily.time.map((dt,di)=>{
          const tF=C2F(d.daily.temperature_2m_mean&&d.daily.temperature_2m_mean[di]!=null?d.daily.temperature_2m_mean[di]:20);
          const cl=d.daily.cloudcover_mean&&d.daily.cloudcover_mean[di]!=null?d.daily.cloudcover_mean[di]:0;
          const ra=d.daily.precipitation_sum&&d.daily.precipitation_sum[di]!=null?d.daily.precipitation_sum[di]:0;
          const tmax=d.daily.temperature_2m_max&&d.daily.temperature_2m_max[di]!=null?C2F(d.daily.temperature_2m_max[di]):tF+5;
          const tmin=d.daily.temperature_2m_min&&d.daily.temperature_2m_min[di]!=null?C2F(d.daily.temperature_2m_min[di]):tF-5;
          return{date:dt,tF,tMax:tmax,tMin:tmin,cl,ra,adj:calc(s.id,tF,cl,ra),dow:new Date(dt+"T12:00:00").getDay()};
        });
      }catch(e){stores[s.id]={error:"Parse error: "+e.message};}
    });
    FC={dates,stores};SEL=0;
  }catch(e){
    FC={error:"Failed: "+e.message,dates:[],stores:{}};
  }
  LOADING=false;render();
}

  const storesWS=STORES.filter(s=>salesMap[s.id]!=null);
  const jsDay=new Date(date+"T12:00:00").getDay();
  
  try{
    const promises=storesWS.map(s=>fetchArchive(s,date).catch(e=>({error:e.message})));
    const raw=await Promise.all(promises);
    
    const out=storesWS.map((s,i)=>{
      const d=raw[i];
      if(!d||d.error||!d.daily)return{store:s,actual:salesMap[s.id],error:(d&&d.error)||"No data"};
      try{
        const tF=C2F(d.daily.temperature_2m_mean&&d.daily.temperature_2m_mean[0]!=null?d.daily.temperature_2m_mean[0]:20);
        const cl=d.daily.cloudcover_mean&&d.daily.cloudcover_mean[0]!=null?d.daily.cloudcover_mean[0]:0;
        const ra=d.daily.precipitation_sum&&d.daily.precipitation_sum[0]!=null?d.daily.precipitation_sum[0]:0;
        const adj=calc(s.id,tF,cl,ra);
        const actual=salesMap[s.id];
        return{store:s,actual,adj,dowW:DOW[s.id][jsDay],weekly:wkly(actual,s.id,jsDay,adj.total)};
      }catch(e){return{store:s,actual:salesMap[s.id],error:"Parse: "+e.message};}
    });
    
    const totA=out.reduce((a,r)=>a+(r.actual||0),0);
    const totW=out.reduce((a,r)=>a+(r.weekly||0),0);
    const adjRows=out.filter(r=>r.adj);
    const avgW=adjRows.length?adjRows.reduce((a,r)=>a+r.adj.total,0)/adjRows.length:0;
    HIST={rows:out,totA,totW,avgW,dayName:DNF[jsDay],date};
  }catch(e){HIST={error:"Failed: "+e.message};}
  
  LOADING=false;render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  try{
    document.getElementById("app").innerHTML=MODE==="forecast"?rfx():rhi();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="section"><div class="err-card">Render error: ${e.message}</div></div>`;
  }
}
function setMode(m){
  MODE=m;SHOW_IN=true;EX={};
  document.getElementById("tab-fc").classList.toggle("active",m==="forecast");
  document.getElementById("tab-hi").classList.toggle("active",m==="historical");
  render();
}
function setDay(i){SEL=i;render();}
function tog(id){EX[id]=!EX[id];render();}

// ── Render Forecast ────────────────────────────────────────────────────────
function rfx(){
  if(LOADING)return`<div class="section"><div class="progress-wrap">
    <div style="font-size:13px;color:var(--sky);margin-bottom:8px">Fetching forecast for all 20 stores…</div>
    <div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">Parallel fetch · Open-Meteo</div>
  </div></div>`;
  
  if(!FC)return`<div class="section"><div class="empty">
    <div class="empty-icon">🌤</div>
    <div class="empty-text">14-day forecast for all 20 stores<br>with weather demand adjustments</div>
    <button class="btn" onclick="runForecast()">▶ Load 14-Day Forecast</button>
  </div></div>`;
  
  if(FC.error)return`<div class="section"><div class="err-card">Error: ${FC.error}</div>
    <button class="btn" onclick="runForecast()" style="margin-top:12px">↻ Retry</button></div>`;
  
  const dates=FC.dates||[];
  if(!dates.length)return`<div class="section"><div class="err-card">No dates returned. Try refreshing.</div>
    <button class="btn" onclick="runForecast()" style="margin-top:12px">↻ Retry</button></div>`;
  
  // Day strip
  let ds=`<div class="day-scroll"><div class="day-strip">`;
  dates.forEach((dt,i)=>{
    const d=new Date(dt+"T12:00:00");
    const sel=i===SEL?"sel":"";
    const lbl=i===0?"Today":DN[d.getDay()];
    ds+=`<button class="day-btn ${sel}" onclick="setDay(${i})"><div class="day-lbl">${lbl}</div><div class="day-dt">${MN[d.getMonth()]} ${d.getDate()}</div></button>`;
  });
  ds+=`</div></div>`;
  
  // System summary
  const vals=STORES.map(s=>{const d=FC.stores[s.id];return(d&&!d.error&&d[SEL])?d[SEL].adj.total:null;}).filter(v=>v!=null);
  const sysAvg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const best=vals.length?Math.max(...vals):0,worst=vals.length?Math.min(...vals):0;
  const bStore=STORES.find(s=>{const d=FC.stores[s.id];return d&&!d.error&&d[SEL]&&d[SEL].adj.total===best;});
  const wStore=STORES.find(s=>{const d=FC.stores[s.id];return d&&!d.error&&d[SEL]&&d[SEL].adj.total===worst;});
  const sd=new Date(dates[SEL]+"T12:00:00");
  
  let sys=`<div class="sys-card" style="background:${ab(sysAvg)}">
    <div style="font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">${DN[sd.getDay()]} ${MN[sd.getMonth()]} ${sd.getDate()} — System Average</div>
    <div class="sys-grid">
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Avg Adj</div><div style="font-size:22px;font-weight:800;color:${ac(sysAvg)}">${fp(sysAvg)}</div></div>
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Best</div><div style="font-size:16px;font-weight:800;color:#4ade80">${fp(best)}</div><div style="font-size:10px;color:var(--muted)">${bStore?bStore.name:""}</div></div>
      <div><div style="font-size:9px;color:var(--muted);margin-bottom:3px">Worst</div><div style="font-size:16px;font-weight:800;color:#f87171">${fp(worst)}</div><div style="font-size:10px;color:var(--muted)">${wStore?wStore.name:""}</div></div>
    </div>
  </div>`;
  
  // Store cards sorted by adj
  const sorted=[...STORES].sort((a,b)=>{
    const da=FC.stores[a.id],db=FC.stores[b.id];
    const va=(da&&!da.error&&da[SEL])?da[SEL].adj.total:-999;
    const vb=(db&&!db.error&&db[SEL])?db[SEL].adj.total:-999;
    return vb-va;
  });
  
  let cards="";
  sorted.forEach(s=>{
    const days=FC.stores[s.id];
    if(!days){cards+=`<div class="err-card">${s.id} · ${s.name}: not loaded</div>`;return;}
    if(days.error){cards+=`<div class="err-card">${s.id} · ${s.name}: ${days.error}</div>`;return;}
    const day=days[SEL];
    if(!day){cards+=`<div class="err-card">${s.id} · ${s.name}: no data for day ${SEL}</div>`;return;}
    const adj=day.adj;
    const key=`f${s.id}`;const open=EX[key];
    // Sparkline
    let sparks="";
    days.forEach((d,i)=>{
      const v=d&&d.adj?d.adj.total:0;
      const h=Math.max(4,Math.min(32,16+v*1.5));
      sparks+=`<div class="spark-bar" style="height:${h}px;background:${ac(v)};opacity:${i===SEL?1:0.45}" onclick="setDay(${i})"></div>`;
    });
    const exp=open?`<div class="expand-body">
      <div class="components">
        <div class="comp-card"><div class="comp-label">🌡 Temp 40%</div><div class="comp-val" style="color:${ac(adj.tAdj)}">${fp(adj.tAdj)}</div><div class="comp-sub">${Math.round(day.tF)}°F vs ${Math.round(adj.base)}°F</div></div>
        <div class="comp-card"><div class="comp-label">☁️ Cloud 50%</div><div class="comp-val" style="color:${ac(adj.cAdj)}">${fp(adj.cAdj)}</div><div class="comp-sub">${Math.round(day.cl)}% · ${adj.cN}</div></div>
        <div class="comp-card"><div class="comp-label">🌧 Rain 10%</div><div class="comp-val" style="color:${ac(adj.rAdj)}">${fp(adj.rAdj)}</div><div class="comp-sub">${adj.rN}</div></div>
      </div>
      <div style="margin-top:10px"><div style="font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">14-Day Trend</div>
        <div class="spark-bars">${sparks}</div>
        <div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:8px;color:var(--dim)">Today</span><span style="font-size:8px;color:var(--dim)">+14d</span></div>
      </div>
    </div>`:"";
    cards+=`<div class="store-card" style="background:${ab(adj.total)}">
      <div class="store-header" onclick="tog('${key}')">
        <div>
          <div class="store-id">${s.id}</div>
          <div class="store-name">${s.name}</div>
          <div class="store-meta">
            <span>${Math.round(day.tMin||day.tF-5)}–${Math.round(day.tMax||day.tF+5)}°F</span>
            <span>${adj.cN}</span>
            ${adj.rN!=="None"?`<span style="color:#93c5fd">${adj.rN}</span>`:""}
          </div>
        </div>
        <div class="store-right">
          <div style="font-size:22px;font-weight:800;color:${ac(adj.total)}">${fp(adj.total)}</div>
          <div style="font-size:12px;color:var(--dim);margin-top:4px">${open?"▲":"▼"}</div>
        </div>
      </div>${exp}</div>`;
  });
  
  return`<div class="section">${ds}${sys}${cards}
    <button class="btn" onclick="runForecast()" style="margin-top:8px;font-size:11px;padding:9px">↻ Refresh Forecast</button>
  </div>`;
}

// ── Render Historical ──────────────────────────────────────────────────────
function rhi(){
  let h=`<div class="section">`;
  h+=`<div style="margin-bottom:10px"><button class="btn btn-sm" onclick="togInput()">${SHOW_IN?"▲ Hide Input":"▼ Edit Sales Data"}</button></div>`;
  
  if(SHOW_IN){
    h+=`<div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:10px">
      <div style="flex:1"><label class="label">Date</label>
        <input type="date" class="input" id="hist-date" value="${SAVED_DATE}">
      </div>
      <button class="btn" style="width:auto" onclick="runHistorical()">▶ Run</button>
    </div>
    <div><label class="label">Sales Data</label>
      <textarea class="input" id="sales-text" rows="4">${SAVED_SALES}</textarea>
    </div>`;
  } else if(!LOADING){
    h+=`<button class="btn" onclick="runHistorical()" style="margin-bottom:12px">▶ Run Model for ${SAVED_DATE}</button>`;
  }
  
  if(LOADING){
    h+=`<div class="progress-wrap">
      <div style="font-size:13px;color:var(--sky);margin-bottom:8px">Fetching weather data…</div>
      <div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">Parallel fetch · Open-Meteo</div>
    </div>`;
  }
  
  if(HIST&&!LOADING){
    if(HIST.error)return h+`<div class="err-card">${HIST.error}</div></div>`;
    h+=`<div class="summary-grid">
      <div class="summary-card" style="grid-column:span 2">
        <div class="summary-label">Date</div>
        <div class="summary-val" style="font-size:15px">${HIST.dayName} · ${HIST.date}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Avg Weather</div>
        <div class="summary-val" style="color:${ac(HIST.avgW)}">${fp(HIST.avgW)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Actual</div>
        <div class="summary-val" style="font-size:16px">${f$(HIST.totA)}</div>
      </div>
    </div>`;
    
    const sorted=[...HIST.rows].sort((a,b)=>(b.weekly||0)-(a.weekly||0));
    sorted.forEach(r=>{
      const key=`h${r.store.id}`;const open=EX[key];const w=r.adj;
      const exp=open&&!r.error&&w?`<div class="expand-body">
        <div class="components">
          <div class="comp-card"><div class="comp-label">🌡 Temp 40%</div><div class="comp-val" style="color:${ac(w.tAdj)}">${fp(w.tAdj)}</div><div class="comp-sub">${w.dev>0?"+":""}${w.dev.toFixed(1)}°F dev</div></div>
          <div class="comp-card"><div class="comp-label">☁️ Cloud 50%</div><div class="comp-val" style="color:${ac(w.cAdj)}">${fp(w.cAdj)}</div><div class="comp-sub">${w.cN}</div></div>
          <div class="comp-card"><div class="comp-label">🌧 Rain 10%</div><div class="comp-val" style="color:${ac(w.rAdj)}">${fp(w.rAdj)}</div><div class="comp-sub">${w.rN}</div></div>
        </div>
        <div class="weekly-banner">
          <div><div style="font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">Implied Weekly</div><div style="font-size:9px;color:var(--dim);margin-top:2px">weather-normalized</div></div>
          <div style="font-size:22px;font-weight:800;color:var(--sky)">${f$(r.weekly)}</div>
        </div>
      </div>`:(open&&r.error?`<div class="expand-body" style="color:#fca5a5;font-size:12px">Error: ${r.error}</div>`:"");
      h+=`<div class="store-card" style="background:${ab(w?w.total:null)}">
        <div class="store-header" onclick="tog('${key}')">
          <div>
            <div class="store-id">${r.store.id}</div>
            <div class="store-name">${r.store.name}</div>
            <div class="store-meta">
              <span>DOW ${r.dowW!=null?r.dowW.toFixed(2):"—"}%</span>
              ${w?`<span style="color:${ac(w.total)};font-weight:600">Wthr ${fp(w.total)}</span>`:""}
              ${r.error?`<span style="color:#fca5a5">⚠ ${r.error}</span>`:""}
            </div>
          </div>
          <div class="store-right">
            <div style="font-size:15px;font-weight:700">${f$(r.actual)}</div>
            ${r.weekly?`<div style="font-size:12px;color:var(--sky)">${f$(r.weekly)}/wk</div>`:""}
            <div style="font-size:12px;color:var(--dim);margin-top:4px">${open?"▲":"▼"}</div>
          </div>
        </div>${exp}</div>`;
    });
    h+=`<div class="totals">
      <div class="tr"><span style="font-size:12px;color:var(--muted)">Total Actual Sales</span><span style="font-size:14px;font-weight:700">${f$(HIST.totA)}</span></div>
      <div class="tr"><span style="font-size:12px;color:var(--muted)">Total Implied Weekly</span><span style="font-size:17px;font-weight:800;color:var(--sky)">${f$(HIST.totW)}</span></div>
    </div>`;
  }
  return h+`</div>`;
}
function togInput(){
  const de=document.getElementById("hist-date");
  const se=document.getElementById("sales-text");
  if(de)SAVED_DATE=de.value;
  if(se)SAVED_SALES=se.value;
  SHOW_IN=!SHOW_IN;render();
}

render();
</script>
</body>
</html>
