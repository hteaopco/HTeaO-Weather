<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HTeaO — Intra Day Labor</title>
<style>
  :root{--bg:#080e1a;--card:#0d1526;--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--dim:#334155;--sky:#38bdf8;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:60px;}

  /* Sidenav */
  .sidenav{width:200px;background:#0a1120;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .sidenav-brand{padding:18px 16px 14px;}
  .sidenav-logo{font-size:17px;font-weight:900;color:#38bdf8;}
  .sidenav-sub{font-size:8px;color:#64748b;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
  .sidenav-div{height:1px;background:rgba(255,255,255,0.08);margin:0 16px;}
  .sidenav-links{padding:12px 8px;}
  .sidenav-lbl{font-size:8px;font-weight:700;color:#64748b;letter-spacing:.12em;text-transform:uppercase;padding:0 8px;margin-bottom:6px;}
  .sidenav-link{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;text-decoration:none;color:#64748b;font-size:12px;font-weight:600;margin-bottom:2px;}
  .sidenav-link.active{background:rgba(56,189,248,0.12);color:#38bdf8;border:1px solid rgba(56,189,248,0.2);}
  .sidenav-dot{width:6px;height:6px;border-radius:50%;background:#334155;flex-shrink:0;}
  .sidenav-link.active .sidenav-dot{background:#38bdf8;}
  .sidenav-footer{margin-top:auto;padding:14px 16px;font-size:9px;color:#1e293b;}
  @media(max-width:768px){.sidenav{display:none;}.main{margin-left:0!important;padding:16px 16px 60px!important;}}

  .main{margin-left:200px;padding:24px 28px 60px;}
  .page-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:14px;}

  /* Store strip */
  .store-strip-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px;padding-bottom:2px;}
  .store-strip{display:flex;gap:6px;min-width:max-content;}
  .store-pill{flex-shrink:0;padding:7px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
  .store-pill.active{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.4);color:var(--sky);font-weight:800;}

  /* Day bar */
  .day-bar{display:flex;align-items:center;gap:8px;margin-bottom:0;flex-wrap:wrap;}
  .today-badge{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:800;background:rgba(56,189,248,0.18);border:1px solid rgba(56,189,248,0.4);color:var(--sky);white-space:nowrap;}
  .day-sep{color:var(--dim);font-size:14px;}
  .diff-day-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);white-space:nowrap;transition:all .15s;}
  .diff-day-btn:hover{border-color:rgba(56,189,248,0.3);color:var(--text);}
  .diff-day-btn.active{background:rgba(56,189,248,0.12);border-color:rgba(56,189,248,0.3);color:var(--sky);}
  .day-override{display:none;margin-top:10px;flex-wrap:wrap;gap:6px;}
  .day-override.show{display:flex;}
  .day-opt{padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);transition:all .15s;}
  .day-opt.active{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.4);color:var(--sky);}

  /* Divider */
  .divider{height:1px;background:var(--border);margin:14px 0 16px;}

  /* Result cards */
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center;}
  .result-card.cut{border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.05);}
  .result-card.add{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.05);}
  .result-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
  .result-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;}
  .result-val.cut{color:var(--red);}
  .result-val.add{color:var(--green);}
  .result-val.flat{color:var(--muted);}
  .result-sub{font-size:10px;color:var(--dim);}

  /* Bracket table */
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
  .table-hdr{display:grid;grid-template-columns:1fr 90px 90px 90px;padding:9px 14px;background:rgba(56,189,248,0.07);border-bottom:1px solid var(--border);gap:8px;}
  .table-hdr span{font-size:9px;font-weight:700;color:var(--sky);letter-spacing:.08em;text-transform:uppercase;text-align:center;}
  .table-hdr span:first-child{text-align:left;}
  .t-row{display:grid;grid-template-columns:1fr 90px 90px 90px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);gap:8px;align-items:center;transition:background .1s;}
  .t-row:last-child{border-bottom:none;}
  .t-row.target{background:rgba(56,189,248,0.08);border-left:2px solid var(--sky);}
  .t-sales{font-size:13px;color:var(--muted);}
  .t-sales.target{color:var(--sky);font-weight:800;}
  .t-adj{font-size:13px;font-weight:800;text-align:center;}
  .t-adj.neg{color:var(--red);}
  .t-adj.pos{color:var(--green);}
  .t-adj.flat{color:var(--muted);}

  /* Expand button */
  .expand-row{display:flex;justify-content:center;padding:10px;border-top:1px solid rgba(255,255,255,0.04);}
  .expand-btn-sm{padding:6px 16px;border-radius:7px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);transition:all .15s;}
  .expand-btn-sm:hover{border-color:rgba(56,189,248,0.3);color:var(--sky);}

  /* Target info */
  .target-bar{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:10px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
  .target-bar-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .target-bar-val{font-size:18px;font-weight:900;color:var(--sky);}

  @media(max-width:600px){
    .table-hdr,.t-row{grid-template-columns:1fr 72px 72px 72px;}
    .result-val{font-size:22px;}
  }
</style>
</head>

// ── State ──

const DOW_TODAY   = new Date().getDay(); // 0=Sun … 6=Sat
function dowToKey(d){ return d===0?'sunday':d===5?'friday':d===6?'saturday':'monthu'; }
const DAY_LABELS  = {sunday:'Sunday',monthu:'Mon–Thu',friday:'Friday',saturday:'Saturday'};
// DOW index for PROJECTED array: [Sun,Mon,Tue,Wed,Thu,Fri,Sat]
const DAY_TO_PROJ = {sunday:0,monthu:1,friday:5,saturday:6};

let STORE   = '01';
let DAY_KEY = dowToKey(DOW_TODAY);
let OVERRIDE_OPEN = false;
// How many extra rows to show above/below target (starts 9 each way, expandable)
let EXPAND_ABOVE = 9;
let EXPAND_BELOW = 9;

// ── Store strip (starts with 01) ──
function buildStrip(){
  document.getElementById('storeStrip').innerHTML =
    STORE_ORDER.map(id=>
      `<div class="store-pill${id===STORE?' active':''}" onclick="selectStore('${id}')">${id} — ${STORE_NAMES[id]}</div>`
    ).join('');
}
function selectStore(id){
  STORE=id; EXPAND_ABOVE=9; EXPAND_BELOW=9; buildStrip(); render();
}

// ── Day bar ──
function buildDayBar(){
  document.getElementById('todayBadge').textContent = DAY_LABELS[DAY_KEY];
  // Highlight override options
  document.querySelectorAll('.day-opt').forEach(b=>{
    b.classList.toggle('active', b.dataset.key===DAY_KEY);
  });
  document.getElementById('diffDayBtn').classList.toggle('active', OVERRIDE_OPEN);
}

function toggleDayOverride(){
  OVERRIDE_OPEN = !OVERRIDE_OPEN;
  document.getElementById('dayOverride').classList.toggle('show', OVERRIDE_OPEN);
  document.getElementById('diffDayBtn').classList.toggle('active', OVERRIDE_OPEN);
}

function setDay(key){
  DAY_KEY = key;
  EXPAND_ABOVE=9; EXPAND_BELOW=9;
  // Close override if they picked today's actual day
  if(key === dowToKey(DOW_TODAY)){
    OVERRIDE_OPEN=false;
    document.getElementById('dayOverride').classList.remove('show');
    document.getElementById('diffDayBtn').classList.remove('active');
  }
  buildDayBar(); render();
}

// ── Lookup helpers ──
function getTable(){ return LABOR_DATA[STORE][DAY_KEY]; }
function projSales(){
  const p = PROJECTED[STORE];
  return p ? p[DAY_TO_PROJ[DAY_KEY]] : 0;
}
function fmtAdj(v){
  if(v===null||v===undefined) return '—';
  if(Math.abs(v)>30) return 'On Par';
  return v<0?`(${Math.abs(v).toFixed(1)})`:`+${v.toFixed(1)}`;
}
function adjCls(v){
  if(!v||Math.abs(v)>30) return 'flat';
  return v<0?'neg':'pos';
}
function cardCls(v){
  if(!v||Math.abs(v)>30) return '';
  return v<0?'cut':'add';
}

// ── Find target index (closest bracket to projected sales) ──
function targetIdx(salesArr, target){
  let idx=0;
  for(let i=0;i<salesArr.length;i++){
    if(target>=salesArr[i]) idx=i; else break;
  }
  return idx;
}

// ── Lookup: given a sales amount, interpolate 12pm/4pm/total ──
function lookupAdj(salesAmt){
  const tbl = getTable();
  const arr = tbl.sales;
  let idx=0;
  for(let i=0;i<arr.length;i++){ if(salesAmt>=arr[i]) idx=i; else break; }
  return { pm12: tbl.pm12[idx], pm4: tbl.pm4[idx], total: tbl.total[idx] };
}

// ── Render everything ──
function render(){
  const proj = projSales();

  // Target bar
  document.getElementById('targetBar').style.display = 'flex';
  document.getElementById('targetVal').textContent = proj ? `$${Math.round(proj).toLocaleString()}` : '—';

  // Build $100-increment rows centered on target
  // rows = target +/- increments in steps of $100
  const target = Math.round(proj/100)*100 || 1000;

  // Generate rows: EXPAND_ABOVE rows below target + target + EXPAND_BELOW rows above
  const rows = [];
  for(let i=EXPAND_ABOVE; i>=1; i--){
    const s = Math.max(0, target - i*100);
    if(s > 0) rows.push(s);
  }
  rows.push(target);
  for(let i=1; i<=EXPAND_BELOW; i++){
    rows.push(target + i*100);
  }

  let html = `<div class="table-hdr"><span>Sales Bracket</span><span>12PM</span><span>4PM</span><span>Total Day</span></div>`;

  rows.forEach(s => {
    const isTarget = s === target;
    const adj = lookupAdj(s);
    html += `<div class="t-row${isTarget?' target':''}">
      <div class="t-sales${isTarget?' target':''}">$${s.toLocaleString()}</div>
      <div class="t-adj ${adjCls(adj.pm12)}">${fmtAdj(adj.pm12)}</div>
      <div class="t-adj ${adjCls(adj.pm4)}">${fmtAdj(adj.pm4)}</div>
      <div class="t-adj ${adjCls(adj.total)}">${fmtAdj(adj.total)}</div>
    </div>`;
  });

  // Top expand row (show more lower + collapse above)
  let topHtml = `<div class="expand-row" style="gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.04);border-top:none;">`;
  if(rows[0] > 100)
    topHtml += `<button class="expand-btn-sm" onclick="expandDir('above')">↑ Show more lower</button>`;
  if(EXPAND_ABOVE > 9)
    topHtml += `<button class="expand-btn-sm" onclick="collapseDir('above')">↓ Collapse lower</button>`;
  topHtml += `</div>`;

  // Bottom expand row (show more higher + collapse below)
  let botHtml = `<div class="expand-row" style="gap:12px;flex-wrap:wrap;">`;
  botHtml += `<button class="expand-btn-sm" onclick="expandDir('below')">↓ Show more higher</button>`;
  if(EXPAND_BELOW > 9)
    botHtml += `<button class="expand-btn-sm" onclick="collapseDir('below')">↑ Collapse higher</button>`;
  botHtml += `</div>`;

  html = `<div class="table-wrap">` + topHtml + html + botHtml + `</div>`;

  document.getElementById('tableArea').innerHTML = html;
}

function expandDir(dir){
  if(dir==='above') EXPAND_ABOVE+=9;
  else EXPAND_BELOW+=9;
  render();
}

function collapseDir(dir){
  if(dir==='above') EXPAND_ABOVE=Math.max(9,EXPAND_ABOVE-9);
  else EXPAND_BELOW=Math.max(9,EXPAND_BELOW-9);
  render();
}
