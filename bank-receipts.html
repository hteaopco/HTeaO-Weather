<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HTeaO — Bank Receipts</title>
<style>
  :root{--bg:#080e1a;--card:#0d1526;--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--dim:#334155;--sky:#38bdf8;--green:#4ade80;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:60px;}

  .header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;}
  .logo{font-size:18px;font-weight:900;color:var(--sky);}
  .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

  .main{padding:16px;}

  /* Expand section */
  .expand-wrap{margin-bottom:10px;}
  .expand-btn{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s;}
  .expand-btn.current{background:rgba(56,189,248,0.08);border-color:rgba(56,189,248,0.25);color:var(--sky);}
  .expand-btn .meta{display:flex;align-items:center;gap:10px;}
  .expand-btn .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(56,189,248,0.15);color:var(--sky);}
  .expand-btn .arrow{font-size:11px;color:var(--muted);transition:transform .25s;flex-shrink:0;}
  .expand-btn.open .arrow{transform:rotate(180deg);}
  .expand-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
  .expand-body.open{display:block;}

  /* Deposit row */
  .deposit-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.04);gap:12px;}
  .deposit-row:last-child{border-bottom:none;}
  .deposit-row.done{background:rgba(74,222,128,0.03);}

  .dep-date{font-size:14px;font-weight:700;color:var(--text);}
  .dep-date.weekend{color:var(--muted);}

  /* Upload button */
  .upload-label{cursor:pointer;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.04);font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
  .upload-label:hover{border-color:rgba(56,189,248,0.4);color:var(--sky);}
  .upload-input{display:none;}

  /* Check */
  .check{display:none;width:28px;height:28px;border-radius:50%;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.35);color:var(--green);font-size:14px;align-items:center;justify-content:center;flex-shrink:0;}
  .check.show{display:flex;}

  /* Section label inside historical */
  .section-month{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:8px 16px 4px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);}

  /* Modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal.open{display:flex;}
  .modal-img{max-width:100%;max-height:85vh;border-radius:10px;object-fit:contain;}
  .modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:var(--text);font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div class="header">
  <div><div class="logo">HTeaO</div><div class="sub">Bank Receipts</div></div>
  <a href="cash.html" style="margin-left:auto;font-size:11px;color:var(--muted);text-decoration:none;">← Back</a>
</div>

<div class="main" id="app"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img class="modal-img" id="modal-img" src="" alt="Receipt">
</div>

<script>
const STATE = {};
try{ const s=sessionStorage.getItem('bank_receipts_v2'); if(s) Object.assign(STATE,JSON.parse(s)); }catch(e){}
function save(){ try{ sessionStorage.setItem('bank_receipts_v2',JSON.stringify(STATE)); }catch(e){} }

// Build every day of March 2026
const MARCH = [];
for(let d=1;d<=31;d++){
  const dt = new Date(2026,2,d); // month is 0-indexed
  const dow = dt.getDay(); // 0=Sun,6=Sat
  MARCH.push({ key:`2026-03-${String(d).padStart(2,'0')}`, label:`03/${String(d).padStart(2,'0')}/26`, weekend: dow===0||dow===6 });
}

// Feb 2026 for historical (2/1 - 2/28)
const FEB = [];
for(let d=1;d<=28;d++){
  const dt = new Date(2026,1,d);
  const dow = dt.getDay();
  FEB.push({ key:`2026-02-${String(d).padStart(2,'0')}`, label:`02/${String(d).padStart(2,'0')}/26`, weekend: dow===0||dow===6 });
}

function makeRow(item){
  return `<div class="deposit-row${STATE[item.key]?' done':''}" id="row-${item.key}">
    <div class="dep-date${item.weekend?' weekend':''}">${item.label}</div>
    <label class="upload-label${STATE[item.key]?' hide':''}" id="lbl-${item.key}" for="file-${item.key}">↑ Upload</label>
    <input class="upload-input" type="file" accept="image/*" capture="environment" id="file-${item.key}" onchange="handleUpload(this,'${item.key}')">
    <div class="check${STATE[item.key]?' show':''}" id="check-${item.key}" onclick="openModal('${item.key}')" style="${STATE[item.key]?'cursor:pointer':''}">✓</div>
  </div>`;
}

function render(){
  document.getElementById('app').innerHTML = `
    <!-- March 2026 current -->
    <div class="expand-wrap">
      <button class="expand-btn current open" id="btn-current" onclick="toggle('current')">
        <div class="meta"><span>March 2026</span><span class="badge">Current Month</span></div>
        <span class="arrow">▼</span>
      </button>
      <div class="expand-body open" id="body-current">
        ${MARCH.map(makeRow).join('')}
      </div>
    </div>

    <!-- Historical -->
    <div class="expand-wrap">
      <button class="expand-btn" id="btn-hist" onclick="toggle('hist')">
        <div class="meta"><span>Historical</span></div>
        <span class="arrow">▼</span>
      </button>
      <div class="expand-body" id="body-hist">
        <div class="section-month">February 2026</div>
        ${FEB.map(makeRow).join('')}
      </div>
    </div>`;
}

function toggle(id){
  document.getElementById('btn-'+id).classList.toggle('open');
  document.getElementById('body-'+id).classList.toggle('open');
}

function handleUpload(input, key){
  if(!input.files||!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    STATE[key] = { dataUrl: e.target.result };
    save();
    // Update row
    document.getElementById('row-'+key).classList.add('done');
    const lbl = document.getElementById('lbl-'+key);
    if(lbl) lbl.style.display='none';
    const chk = document.getElementById('check-'+key);
    if(chk){ chk.classList.add('show'); chk.style.cursor='pointer'; chk.onclick=()=>openModal(key); }
  };
  reader.readAsDataURL(input.files[0]);
}

function openModal(key){
  const s = STATE[key];
  if(!s) return;
  document.getElementById('modal-img').src = s.dataUrl;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

render();
</script>
</body>
</html>
