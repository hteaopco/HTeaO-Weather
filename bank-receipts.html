<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HTeaO — Bank Receipts</title>
<style>
  :root{--bg:#080e1a;--card:#0d1526;--border:rgba(255,255,255,0.08);--text:#e2e8f0;--muted:#64748b;--dim:#334155;--sky:#38bdf8;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:60px;}

  /* Header */
  .header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;}
  .header-top{display:flex;align-items:center;gap:10px;}
  .logo{font-size:18px;font-weight:900;color:var(--sky);}
  .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

  /* Main */
  .main{padding:16px;}

  /* Expand section */
  .expand-wrap{margin-bottom:10px;}
  .expand-btn{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;text-align:left;transition:border-color .15s;}
  .expand-btn.current{background:rgba(56,189,248,0.08);border-color:rgba(56,189,248,0.25);color:var(--sky);}
  .expand-btn:hover{border-color:rgba(56,189,248,0.3);}
  .expand-btn .meta{display:flex;align-items:center;gap:10px;}
  .expand-btn .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(56,189,248,0.15);color:var(--sky);}
  .expand-btn .arrow{font-size:11px;color:var(--muted);transition:transform .25s;flex-shrink:0;}
  .expand-btn.open .arrow{transform:rotate(180deg);}
  .expand-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
  .expand-body.open{display:block;}

  /* Deposit row */
  .deposit-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);gap:12px;}
  .deposit-row:last-child{border-bottom:none;}
  .deposit-row.uploaded{background:rgba(74,222,128,0.03);}

  .dep-status{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(255,255,255,0.03);}
  .dep-status.done{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:var(--green);}

  .dep-date{font-size:14px;font-weight:700;color:var(--text);min-width:80px;}
  .dep-amount{font-size:13px;color:var(--green);font-weight:700;flex:1;}
  .dep-amount.none{color:var(--dim);}

  /* Upload button */
  .upload-label{cursor:pointer;display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.04);font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;transition:border-color .15s,color .15s;}
  .upload-label:hover{border-color:rgba(56,189,248,0.4);color:var(--sky);}
  .upload-label.done{border-color:rgba(74,222,128,0.3);color:var(--green);background:rgba(74,222,128,0.06);}
  .upload-input{display:none;}

  /* Receipt preview thumbnail */
  .thumb{width:36px;height:36px;border-radius:5px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;cursor:pointer;}

  /* Modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal.open{display:flex;}
  .modal-img{max-width:100%;max-height:85vh;border-radius:10px;object-fit:contain;}
  .modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:var(--text);font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* Section label */
  .section-month{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:8px 16px 4px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);}
</style>
</head>
<body>

<!-- Image preview modal -->
<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img class="modal-img" id="modal-img" src="" alt="Receipt">
</div>

<script>
// ── State: persists in sessionStorage for this session ──
const STATE = {};
try {
  const saved = sessionStorage.getItem('bank_receipts');
  if (saved) Object.assign(STATE, JSON.parse(saved));
} catch(e){}

function save(){ try{ sessionStorage.setItem('bank_receipts', JSON.stringify(STATE)); }catch(e){} }

// ── Restore state on load ──
window.addEventListener('DOMContentLoaded', () => {
  Object.keys(STATE).forEach(dateKey => {
    const s = STATE[dateKey];
    if (s && s.dataUrl) applyUpload(dateKey, s.dataUrl);
  });
});

// ── Toggle expand ──
function toggle(id) {
  const btn = document.getElementById('btn-' + id);
  const body = document.getElementById('body-' + id);
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

// ── Handle file upload ──
function handleUpload(input, dateKey) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    STATE[dateKey] = { dataUrl };
    save();
    applyUpload(dateKey, dataUrl);
  };
  reader.readAsDataURL(input.files[0]);
}

function applyUpload(dateKey, dataUrl) {
  // Status dot → green check
  const status = document.getElementById('status-' + dateKey);
  if (status) { status.textContent = '✓'; status.className = 'dep-status done'; }

  // Row tint
  const row = document.getElementById('row-' + dateKey);
  if (row) row.classList.add('uploaded');

  // Thumbnail
  const wrap = document.getElementById('thumb-wrap-' + dateKey);
  if (wrap) {
    wrap.innerHTML = `<img class="thumb" src="${dataUrl}" alt="receipt" onclick="openModal('${dateKey}')">`;
  }

  // Upload button → Uploaded
  const lbl = document.getElementById('lbl-' + dateKey);
  if (lbl) { lbl.textContent = '✓ Uploaded'; lbl.className = 'upload-label done'; }
}

// ── Modal ──
function openModal(dateKey) {
  const s = STATE[dateKey];
  if (!s) return;
  document.getElementById('modal-img').src = s.dataUrl;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
</script>
</body>
</html>
