<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HTeaO — Schedule Guidance</title>
<style>
  :root{
    --bg:#080e1a;--card:#0d1526;--card-current:#0a1f3a;--border:rgba(255,255,255,0.08);
    --text:#e2e8f0;--muted:#64748b;--dim:#1e293b;
    --sky:#38bdf8;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;
    --nav-w:220px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:60px;}

  .nav{width:var(--nav-w);background:#0a1120;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .nav-brand{padding:24px 20px 20px;}
  .nav-logo{font-size:22px;font-weight:900;color:var(--sky);}
  .nav-sub{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
  .nav-divider{height:1px;background:var(--border);margin:0 20px;}
  .nav-section{padding:16px 12px 8px;}
  .nav-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;padding:0 8px;margin-bottom:6px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:13px;font-weight:600;transition:background .15s,color .15s;margin-bottom:2px;}
  .nav-link:hover{background:rgba(255,255,255,0.05);color:var(--text);}
  .nav-link.active{background:rgba(56,189,248,0.12);color:var(--sky);border:1px solid rgba(56,189,248,0.2);}
  .nav-link .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .nav-link.active .dot{background:var(--sky);}
  .nav-footer{margin-top:auto;padding:16px 20px;font-size:10px;color:var(--dim);}

  .main{margin-left:var(--nav-w);padding:32px 28px 60px;}
  @media(max-width:768px){
    .nav{transform:translateX(-100%);transition:transform .25s;}
    .nav.open{transform:translateX(0);}
    .main{margin-left:0;padding:64px 16px 60px;}
    .hamburger{display:flex;}
    .overlay{display:block;}
  }
  .hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;gap:4px;flex-direction:column;}
  .hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}

  .page-hdr{margin-bottom:24px;}
  .page-title{font-size:22px;font-weight:900;color:var(--text);}
  .page-sub{font-size:12px;color:var(--muted);margin-top:4px;}

  /* Separator between week 1 and 2 */
  .week-separator{height:1px;background:rgba(56,189,248,0.15);margin:16px 0;}

  /* Week blocks */
  .week-block{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:var(--card);}
  .week-block.current{background:var(--card-current);border-color:rgba(56,189,248,0.3);box-shadow:0 0 0 1px rgba(56,189,248,0.08) inset;}

  .week-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;gap:12px;}
  .week-hdr:hover{background:rgba(255,255,255,0.02);}
  .week-dates{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;}
  .week-block.current .week-dates{color:var(--sky);}

  /* Meta — stacked: "Last updated" label above date */
  .week-meta-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex:1;}
  .week-meta-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .week-meta-date{font-size:11px;font-weight:700;color:var(--text);}
  .week-meta-time{font-size:10px;color:var(--muted);}
  .week-meta-none{font-size:10px;color:var(--dim);}

  .week-chevron{font-size:11px;color:var(--muted);flex-shrink:0;}

  /* Store table */
  .store-table{border-top:1px solid var(--border);}
  .store-table-hdr{display:grid;grid-template-columns:1.6fr 1fr 1fr 60px;gap:4px;padding:7px 14px;background:rgba(56,189,248,0.06);border-bottom:1px solid rgba(56,189,248,0.15);}
  .store-table-hdr span{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .store-table-hdr .col-r{text-align:right;}

  .store-row{display:grid;grid-template-columns:1.6fr 1fr 1fr 60px;gap:4px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;}
  .store-row:last-child{border-bottom:none;}
  .store-row:hover{background:rgba(255,255,255,0.02);}

  .store-name{font-size:12px;font-weight:600;color:var(--text);}
  .val{font-size:13px;font-weight:700;text-align:right;}
  .val-sales{color:var(--sky);}
  .val-dev-neg{color:var(--red);}
  .val-dev-pos{color:var(--green);}
  .val-dev-zero{color:var(--muted);}

  .btn-edit{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;float:right;}
  .btn-edit:hover{border-color:rgba(56,189,248,0.4);color:var(--sky);background:rgba(56,189,248,0.08);}

  /* Edit form — expands below the row */
  .edit-form{padding:12px 14px 14px;background:rgba(56,189,248,0.05);border-bottom:1px solid rgba(56,189,248,0.15);}
  .edit-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .edit-field{display:flex;flex-direction:column;gap:5px;}
  .edit-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

  /* Stepper control */
  .stepper{display:flex;align-items:center;border:1px solid rgba(56,189,248,0.35);border-radius:9px;overflow:hidden;background:rgba(56,189,248,0.06);}
  .stepper-btn{width:38px;height:40px;background:rgba(56,189,248,0.1);border:none;color:var(--sky);font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s;line-height:1;padding-bottom:1px;}
  .stepper-btn:hover{background:rgba(56,189,248,0.2);}
  .stepper-btn:active{background:rgba(56,189,248,0.3);}
  .stepper-val{flex:1;text-align:center;font-size:14px;font-weight:800;color:var(--text);padding:0 4px;user-select:none;}
  .stepper-val.neg{color:var(--red);}
  .stepper-val.pos{color:var(--green);}

  /* Save / Cancel row */
  .edit-actions{display:flex;gap:8px;}
  .btn-save{flex:1;padding:9px;border-radius:8px;border:1px solid rgba(74,222,128,0.4);background:rgba(74,222,128,0.1);color:var(--green);font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;}
  .btn-save:hover{background:rgba(74,222,128,0.22);}
  .btn-cancel{padding:9px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d1f3a;border:1px solid rgba(74,222,128,0.4);color:var(--green);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;transition:transform .25s ease;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<button class="hamburger" onclick="toggleNav()"><span></span><span></span><span></span></button>
<div class="overlay" id="overlay" onclick="toggleNav()"></div>

<div class="nav" id="nav">
  <div class="nav-brand">
    <div class="nav-logo">HTeaO</div>
    <div class="nav-sub">Franchise Ops</div>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-section">
    <div class="nav-label">Tools</div>
    <a class="nav-link" href="index.html"><div class="dot"></div>Home</a>
    <a class="nav-link" href="sales.html"><div class="dot"></div>Sales Information</a>
    <a class="nav-link" href="par.html"><div class="dot"></div>Product Tracking</a>
    <a class="nav-link" href="cash.html"><div class="dot"></div>Cash Handling</a>
    <a class="nav-link" href="inventory.html"><div class="dot"></div>Inventory</a>
    <a class="nav-link active" href="labor.html"><div class="dot"></div>Labor Management</a>
  </div>
  <div class="nav-footer">HTeaO PCO · Internal Use</div>
</div>

<div class="main">
  <div class="page-hdr">
    <div class="page-title">Schedule Guidance</div>
    <div class="page-sub">Weekly sales targets and labor deviation by store — 8 weeks out</div>
  </div>
  <div id="weeks-container"></div>
</div>

<div class="toast" id="toast">✓ Saved</div>

<script>
const STORES = [
  {id:'01',name:'Yukon'},{id:'02',name:'The Village'},{id:'03',name:'Bartlesville'},
  {id:'04',name:'SW OKC'},{id:'05',name:'Uptown'},{id:'06',name:'Norman 1'},
  {id:'07',name:'Shawnee'},{id:'08',name:'Duncan'},{id:'09',name:'Lawton'},
  {id:'10',name:'Chickasha'},{id:'11',name:'OU Med'},{id:'12',name:'Moore'},
  {id:'13',name:'Norman 2'},{id:'14',name:'Webb City'},{id:'15',name:'Pecos'},
  {id:'16',name:'Carlsbad'},{id:'17',name:'Las Cruces'},{id:'18',name:'Hutchinson'},
  {id:'19',name:'Clovis'},{id:'20',name:'Hereford'},
];

const DEFAULT_SALES = {
  '01':14000,'02':21000,'03':21000,'04':17000,'05':10000,
  '06':14000,'07':18000,'08':13000,'09':13000,'10':13000,
  '11':0,'12':13000,'13':13000,'14':10000,'15':17000,
  '16':21000,'17':40000,'18':22000,'19':30000,'20':16000,
};

// ── Weeks ─────────────────────────────────────────────────────────────
function getWeekStart(d) {
  const r=new Date(d); r.setHours(0,0,0,0); r.setDate(r.getDate()-r.getDay()); return r;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return (d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')+'/'+d.getFullYear().toString().slice(-2);}
function weekKey(d){return d.toISOString().split('T')[0];}
function generateWeeks(){
  const ws=getWeekStart(new Date());
  return Array.from({length:8},(_,i)=>{
    const sun=addDays(ws,i*7),sat=addDays(sun,6);
    return{sun,sat,key:weekKey(sun),isCurrent:i===0};
  });
}

// ── Storage ────────────────────────────────────────────────────────────
function loadData(wk){
  const r=localStorage.getItem('sched_'+wk);
  if(r) return JSON.parse(r);
  const d={};
  STORES.forEach(s=>{d[s.id]={sales:DEFAULT_SALES[s.id]||0,dev:-14};});
  return d;
}
function saveData(wk,d){localStorage.setItem('sched_'+wk,JSON.stringify(d));}
function getMeta(wk){const r=localStorage.getItem('sched_meta_'+wk);return r?JSON.parse(r):null;}
function setMeta(wk){
  const now=new Date();
  localStorage.setItem('sched_meta_'+wk,JSON.stringify({
    date:now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    time:now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
  }));
}

// ── Format ─────────────────────────────────────────────────────────────
function fmtSales(v){
  if(!v&&v!==0) return '—';
  return '$'+Number(v).toLocaleString('en-US');
}
function fmtDev(v){
  const n=parseFloat(v);
  if(isNaN(n)) return '—';
  return (n>0?'+':'')+n.toFixed(2).replace(/\.00$/,'')+'%';
}
function devClass(v){
  const n=parseFloat(v);
  if(isNaN(n)||n===0) return 'val-dev-zero';
  return n<0?'val-dev-neg':'val-dev-pos';
}
function stepperValClass(v){
  const n=parseFloat(v);
  if(isNaN(n)||n===0) return '';
  return n<0?' neg':' pos';
}

// ── Stepper state (for active edit form) ──────────────────────────────
let EDIT_STATE = null; // {wk, storeId, sales, dev}

// ── Open weeks ─────────────────────────────────────────────────────────
const OPEN_WEEKS = new Set();

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  const c=document.getElementById('weeks-container');
  const weeks=generateWeeks();
  let html='';
  weeks.forEach((w,i)=>{
    if(i===1) html+=`<div class="week-separator"></div>`;
    html+=renderWeek(w);
  });
  c.innerHTML=html;
}

function renderWeek(w){
  const meta=getMeta(w.key);
  const isOpen=OPEN_WEEKS.has(w.key);

  let metaHtml;
  if(meta){
    metaHtml=`<div class="week-meta-wrap">
      <div class="week-meta-label">Last updated</div>
      <div class="week-meta-date">${meta.date}</div>
      <div class="week-meta-time">${meta.time}</div>
    </div>`;
  } else {
    metaHtml=`<div class="week-meta-wrap"><div class="week-meta-none">Not yet saved</div></div>`;
  }

  const bodyHtml=isOpen?renderWeekBody(w):'';

  return `<div class="week-block${w.isCurrent?' current':''}" id="week_${w.key}">
    <div class="week-hdr" onclick="toggleWeek('${w.key}')">
      <div class="week-dates">${fmtShort(w.sun)} &ndash; ${fmtShort(w.sat)}</div>
      ${metaHtml}
      <div class="week-chevron">${isOpen?'▲':'▼'}</div>
    </div>
    ${bodyHtml}
  </div>`;
}

function renderWeekBody(w){
  const data=loadData(w.key);
  const rows=STORES.map(s=>{
    const isEditing=EDIT_STATE&&EDIT_STATE.wk===w.key&&EDIT_STATE.storeId===s.id;
    return isEditing?renderEditForm(w.key,s):renderStoreRow(w.key,s,data[s.id]);
  }).join('');
  return `<div class="store-table">
    <div class="store-table-hdr">
      <span>Store</span>
      <span class="col-r">Sales Target</span>
      <span class="col-r">Labor Dev %</span>
      <span></span>
    </div>
    ${rows}
  </div>`;
}

function renderStoreRow(wk,store,entry){
  const sales=entry?.sales??DEFAULT_SALES[store.id]??0;
  const dev=entry?.dev??-14;
  return `<div class="store-row" id="row_${wk}_${store.id}">
    <div class="store-name">${store.id} &ndash; ${store.name}</div>
    <div class="val val-sales">${fmtSales(sales)}</div>
    <div class="val ${devClass(dev)}">${fmtDev(dev)}</div>
    <div><button class="btn-edit" onclick="startEdit('${wk}','${store.id}')">Edit</button></div>
  </div>`;
}

function renderEditForm(wk,store){
  const s=EDIT_STATE;
  const salesFmt='$'+Number(s.sales).toLocaleString('en-US');
  const devFmt=(s.dev>0?'+':'')+parseFloat(s.dev).toFixed(2).replace(/\.00$/,'')+'%';
  const dClass=stepperValClass(s.dev);

  return `
  <div class="store-row" style="background:rgba(56,189,248,0.05);border-bottom:none;opacity:0.6;" id="row_${wk}_${store.id}">
    <div class="store-name" style="color:var(--muted)">${store.id} &ndash; ${store.name}</div>
    <div></div><div></div><div></div>
  </div>
  <div class="edit-form" id="editform_${wk}_${store.id}">
    <div class="edit-fields">
      <div class="edit-field">
        <div class="edit-label">Sales Target</div>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepSales(-1000)">−</button>
          <div class="stepper-val" id="disp_sales">${salesFmt}</div>
          <button class="stepper-btn" onclick="stepSales(1000)">+</button>
        </div>
      </div>
      <div class="edit-field">
        <div class="edit-label">Labor Dev %</div>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepDev(-0.25)">−</button>
          <div class="stepper-val${dClass}" id="disp_dev">${devFmt}</div>
          <button class="stepper-btn" onclick="stepDev(0.25)">+</button>
        </div>
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn-save" onclick="commitEdit()">Save</button>
      <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>`;
}

// ── Stepper actions ────────────────────────────────────────────────────
function stepSales(delta){
  if(!EDIT_STATE) return;
  EDIT_STATE.sales = Math.max(0, EDIT_STATE.sales + delta);
  const el=document.getElementById('disp_sales');
  if(el) el.textContent='$'+Number(EDIT_STATE.sales).toLocaleString('en-US');
}

function stepDev(delta){
  if(!EDIT_STATE) return;
  // Round to 2 decimal places to avoid floating point drift
  EDIT_STATE.dev = Math.round((EDIT_STATE.dev + delta) * 100) / 100;
  const el=document.getElementById('disp_dev');
  if(el){
    const n=EDIT_STATE.dev;
    el.textContent=(n>0?'+':'')+n.toFixed(2).replace(/\.00$/,'')+'%';
    el.className='stepper-val'+(n<0?' neg':n>0?' pos':'');
  }
}

// ── Interactions ───────────────────────────────────────────────────────
function toggleWeek(wk){
  if(OPEN_WEEKS.has(wk)){
    OPEN_WEEKS.delete(wk);
    EDIT_STATE=null;
  } else {
    OPEN_WEEKS.add(wk);
  }
  render();
}

function startEdit(wk,storeId){
  const data=loadData(wk);
  const entry=data[storeId]||{sales:DEFAULT_SALES[storeId]||0,dev:-14};
  EDIT_STATE={wk,storeId,sales:entry.sales,dev:entry.dev};
  rerenderWeekBody(wk);
}

function commitEdit(){
  if(!EDIT_STATE) return;
  const{wk,storeId,sales,dev}=EDIT_STATE;
  const data=loadData(wk);
  data[storeId]={sales,dev};
  saveData(wk,data);
  setMeta(wk);
  EDIT_STATE=null;
  rerenderWeekBody(wk);
  refreshWeekHeader(wk);
  showToast();
}

function cancelEdit(){
  if(!EDIT_STATE) return;
  const wk=EDIT_STATE.wk;
  EDIT_STATE=null;
  rerenderWeekBody(wk);
}

function rerenderWeekBody(wk){
  const weeks=generateWeeks();
  const w=weeks.find(x=>x.key===wk);
  if(!w) return;
  const el=document.getElementById(`week_${wk}`);
  if(!el) return;
  const existing=el.querySelector('.store-table');
  if(existing) existing.remove();
  el.querySelectorAll('.edit-form').forEach(f=>f.remove());
  const hdr=el.querySelector('.week-hdr');
  hdr.insertAdjacentHTML('afterend',renderWeekBody(w));
}

function refreshWeekHeader(wk){
  const meta=getMeta(wk);
  if(!meta) return;
  const el=document.getElementById(`week_${wk}`);
  if(!el) return;
  const wrap=el.querySelector('.week-meta-wrap');
  if(!wrap) return;
  wrap.innerHTML=`<div class="week-meta-label">Last updated</div>
    <div class="week-meta-date">${meta.date}</div>
    <div class="week-meta-time">${meta.time}</div>`;
}

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function toggleNav(){
  document.getElementById('nav').classList.toggle('open');
  document.getElementById('overlay').style.display=
    document.getElementById('nav').classList.contains('open')?'block':'none';
}

OPEN_WEEKS.add(generateWeeks()[0].key);
render();
</script>
</body>
</html>
