<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HTeaO — Par Prep</title>
<style>
  :root {
    --bg:#080e1a; --card:#0d1526; --border:rgba(255,255,255,0.08);
    --text:#e2e8f0; --muted:#64748b; --dim:#334155;
    --sky:#38bdf8; --green:#4ade80; --yellow:#fbbf24; --red:#f87171;
    --purple:#a5b4fc; --teal:#2dd4bf;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;}
  .header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px 8px;}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .logo{font-size:20px;font-weight:900;color:var(--sky);letter-spacing:-.5px;}
  .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
  .as-of{margin-left:auto;font-size:9px;color:var(--dim);}
  .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .tab{padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted);line-height:1.3;}
  .tab.active{background:rgba(56,189,248,0.15);border-color:rgba(56,189,248,0.4);color:var(--sky);}
  .store-strip-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:6px 16px;}
  .store-strip{display:flex;gap:6px;min-width:max-content;}
  .store-pill{flex-shrink:0;padding:6px 11px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);white-space:nowrap;}
  .store-pill.active{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.4);color:var(--sky);font-weight:800;}
  .section{padding:12px 16px 20px;}
  .card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
  .card-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  .card-title{font-size:10px;font-weight:700;color:var(--sky);letter-spacing:.08em;text-transform:uppercase;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;}
  .stat{text-align:center;}
  .stat-val{font-size:18px;font-weight:800;}
  .stat-lbl{font-size:9px;color:var(--muted);margin-top:2px;}
  .tbl-hdr{display:flex;justify-content:space-between;padding:6px 14px 4px;border-bottom:1px solid var(--border);}
  .tbl-hdr-lbl{font-size:9px;color:var(--muted);font-weight:700;}
  .tbl-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.04);}
  .tbl-row:last-child{border-bottom:none;}
  .tbl-store{font-size:12px;font-weight:600;flex:1.5;}
  .tbl-cells{display:flex;}
  .tbl-cell{text-align:right;width:54px;font-size:11px;font-weight:700;}
  .section-lbl{font-size:9px;font-weight:800;color:var(--yellow);letter-spacing:.1em;text-transform:uppercase;padding:8px 14px 3px;background:rgba(251,191,36,0.04);}
  .build-hdr{display:grid;grid-template-columns:1fr 60px 70px 70px;gap:2px;padding:7px 14px 5px;border-bottom:1px solid var(--border);}
  .build-hdr span{font-size:9px;color:var(--muted);font-weight:700;text-align:right;}
  .build-hdr span:first-child{text-align:left;}
  .build-total{display:grid;grid-template-columns:1fr 60px 70px 70px;gap:2px;padding:7px 14px;background:rgba(56,189,248,0.07);border-bottom:1px solid rgba(56,189,248,0.2);}
  .build-total-lbl{font-size:11px;font-weight:800;color:var(--sky);}
  .build-total-val{font-size:13px;font-weight:800;color:var(--sky);text-align:right;}
  .build-row{display:grid;grid-template-columns:1fr 60px 70px 70px;gap:2px;padding:5px 14px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .build-name{font-size:11px;}
  .build-val{font-size:12px;font-weight:700;text-align:right;}
  .zero{color:var(--dim);}
  .flag-red{color:var(--red);}
  .flag-yel{color:var(--yellow);}
  .flag-grn{color:var(--green);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div><div class="logo">🍵 HTeaO</div><div class="sub">Par Prep Tracking</div></div>
    <div class="as-of" id="as-of"></div>
  </div>
  <div class="tabs">
    
    <div class="tab active" onclick="setTab('waste')" id="tab-waste">🗑️ Waste</div>
    <div class="tab" onclick="setTab('gallon')" id="tab-gallon">🧊 Gallon<br>Prep</div>
    <div class="tab" onclick="setTab('jugs')" id="tab-jugs">🫙 Jugs</div>
  </div>
</div>

<div id="app"></div>

<script>
// ── Hardcoded data from Google Sheet (as of 03/15/26) ─────────────────────
// Summary tab: col0=location, col1=last10pct, col4=trendWaste, col5=cogsAffect
// col7=wastYestGal, col8=wastYestJug, col9=wastL7Gal, col10=wastL7Jug, col11=wastL30Gal, col12=wastL30Jug

const WASTE_DATA = {
  '01':{name:'Yukon',        last10:.0252, cogsAffect:.0035, wastYestGal:10,   wastYestJug:0,     wastL7Gal:18.5,  wastL7Jug:8.25,  wastL30Gal:83,    wastL30Jug:20},
  '02':{name:'The Village',  last10:.0268, cogsAffect:.0012, wastYestGal:0,    wastYestJug:0,     wastL7Gal:8,     wastL7Jug:0,     wastL30Gal:53,    wastL30Jug:1},
  '03':{name:'Bartlesville', last10:.0254, cogsAffect:.0051, wastYestGal:0,    wastYestJug:1,     wastL7Gal:0,     wastL7Jug:33,    wastL30Gal:2,     wastL30Jug:184.5},
  '04':{name:'SW OKC',       last10:.0280, cogsAffect:.0015, wastYestGal:0,    wastYestJug:0,     wastL7Gal:8,     wastL7Jug:0,     wastL30Gal:57,    wastL30Jug:0},
  '05':{name:'Uptown',       last10:.0241, cogsAffect:.0012, wastYestGal:0,    wastYestJug:0,     wastL7Gal:0,     wastL7Jug:6,     wastL30Gal:16,    wastL30Jug:7},
  '06':{name:'Norman 1',     last10:.0316, cogsAffect:.0078, wastYestGal:0,    wastYestJug:14.25, wastL7Gal:0,     wastL7Jug:34.5,  wastL30Gal:13,    wastL30Jug:176},
  '07':{name:'Shawnee',      last10:.0288, cogsAffect:.0046, wastYestGal:6,    wastYestJug:0,     wastL7Gal:50,    wastL7Jug:0,     wastL30Gal:170.5, wastL30Jug:0},
  '08':{name:'Duncan',       last10:.0230, cogsAffect:.0061, wastYestGal:0,    wastYestJug:13,    wastL7Gal:13,    wastL7Jug:25,    wastL30Gal:46,    wastL30Jug:99},
  '09':{name:'Lawton',       last10:.0277, cogsAffect:.0003, wastYestGal:0,    wastYestJug:0,     wastL7Gal:4,     wastL7Jug:0,     wastL30Gal:8,     wastL30Jug:0},

  '11':{name:'OU Med',       last10:null,  cogsAffect:null,  wastYestGal:0,    wastYestJug:0,     wastL7Gal:0,     wastL7Jug:0,     wastL30Gal:0,     wastL30Jug:0},
  '12':{name:'Moore',        last10:.0289, cogsAffect:.0058, wastYestGal:0,    wastYestJug:6.2,   wastL7Gal:0,     wastL7Jug:25.7,  wastL30Gal:6,     wastL30Jug:113.2},
  '13':{name:'Norman 2',     last10:.0267, cogsAffect:.0032, wastYestGal:2,    wastYestJug:3.25,  wastL7Gal:2,     wastL7Jug:16,    wastL30Gal:5,     wastL30Jug:61.25},
  '14':{name:'Webb City',    last10:.0304, cogsAffect:.0134, wastYestGal:0,    wastYestJug:3.5,   wastL7Gal:8,     wastL7Jug:36.25, wastL30Gal:23,    wastL30Jug:179.25},
  '15':{name:'Pecos',        last10:.0257, cogsAffect:.0016, wastYestGal:0,    wastYestJug:0,     wastL7Gal:7,     wastL7Jug:16,    wastL30Gal:32,    wastL30Jug:32},
  '16':{name:'Carlsbad',     last10:.0285, cogsAffect:.0000, wastYestGal:0,    wastYestJug:0,     wastL7Gal:0,     wastL7Jug:0,     wastL30Gal:0,     wastL30Jug:0},
  '17':{name:'Las Cruces',   last10:.0244, cogsAffect:.0005, wastYestGal:0,    wastYestJug:0,     wastL7Gal:4,     wastL7Jug:4,     wastL30Gal:29,    wastL30Jug:13.5},
  '18':{name:'Hutchinson',   last10:.0221, cogsAffect:.0028, wastYestGal:0,    wastYestJug:0,     wastL7Gal:0,     wastL7Jug:18.75, wastL30Gal:2,     wastL30Jug:104.98},
  '19':{name:'Clovis',       last10:.0256, cogsAffect:.0004, wastYestGal:0,    wastYestJug:0,     wastL7Gal:1,     wastL7Jug:6,     wastL30Gal:6,     wastL30Jug:22},
  '20':{name:'Hereford',     last10:.0256, cogsAffect:.0028, wastYestGal:0,    wastYestJug:2.25,  wastL7Gal:0,     wastL7Jug:8,     wastL30Gal:14,    wastL30Jug:68.65},
};

// ── Gallon Build Par by store, by DOW (Sun=0 ... Sat=6) ───────────────────
// Format: { flavor: [Sun,Mon,Tue,Wed,Thu,Fri,Sat] }
// Yukon data from screenshot; other stores use same structure (populate as available)
const BUILD_PAR = {
  '01': { // Yukon
    sweets: {
      'Regular':      [10,8,8,8,8,13,15],
      'Georgia Peach': [8,6,6,6,6,10,11],
      'Blueberry':    [7,6,6,6,6,9,10],
      'Coconut':      [5,4,4,4,4,7,8],
      'Watermelon':   [3,2,2,2,2,3,4],
      'Raspberry':    [3,3,3,3,3,4,5],
      'Mint':         [3,2,2,2,2,4,4],
      'Peach Ginger': [2,2,2,2,2,3,3],
    },
    unsweets: {
      'Regular':      [6,5,5,5,5,8,9],
      'Georgia Peach':[3,3,3,3,3,4,5],
      'Blueberry':    [2,0,0,0,0,2,2],
      'Coconut':      [2,0,0,0,0,2,3],
      'Watermelon':   [0,0,0,0,0,0,0],
      'Raspberry':    [0,0,0,0,0,2,2],
      'Mint':         [0,0,0,0,0,0,0],
      'Peach Ginger': [0,0,0,0,0,0,0],
    },
    specialty: {
      'Strawberry Passion':[0,0,0,0,0,0,0],
      'Texas Chai':        [6,5,5,5,5,8,9],
      'Pink Lemonade':     [0,0,0,0,0,0,0],
      'Green - Sweet Almond':[2,2,2,2,2,3,4],
      'Green - Unsweet':   [0,0,0,0,0,0,0],
      'Mango Fresco':      [0,0,0,0,0,0,0],
      'Sweet Zero':        [2,2,2,2,2,3,4],
      'Ryan Palmer':       [2,2,2,2,2,3,3],
      'Decaf - Unsweet':   [0,0,0,0,0,0,0],
      'Cherry':            [2,2,2,2,2,3,3],
    },
  },
};

// ── Store list ────────────────────────────────────────────────────────────
const STORES = [
  {id:'01',name:'Yukon'},{id:'02',name:'The Village'},{id:'03',name:'Bartlesville'},
  {id:'04',name:'SW OKC'},{id:'05',name:'Uptown'},{id:'06',name:'Norman 1'},
  {id:'07',name:'Shawnee'},{id:'08',name:'Duncan'},{id:'09',name:'Lawton'},
  {id:'10',name:'Chickasha'},{id:'11',name:'OU Med'},{id:'12',name:'Moore'},
  {id:'13',name:'Norman 2'},{id:'14',name:'Webb City'},{id:'15',name:'Pecos'},
  {id:'16',name:'Carlsbad'},{id:'17',name:'Las Cruces'},{id:'18',name:'Hutchinson'},
  {id:'19',name:'Clovis'},{id:'20',name:'Hereford'},
];

// ── State ──────────────────────────────────────────────────────────────────
let MODE = 'waste';
let SEL = '01';
const DOW = new Date().getDay(); // 0=Sun ... 6=Sat
const DOW_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── Formatters ─────────────────────────────────────────────────────────────
const fN = (v,d=1) => { if(v===null||v===undefined) return '—'; const n=parseFloat(v); return isNaN(n)?'—':n===0?'0':n.toFixed(d).replace(/\.0$/,''); };
const fP = v => v===null||v===undefined?'—':(v*100).toFixed(2)+'%';
const vc = v => v===null?'var(--muted)':v<=0.0025?'var(--green)':v<=0.004?'var(--yellow)':'var(--red)';

// ── Navigation ─────────────────────────────────────────────────────────────
function setTab(t){ MODE=t; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); render(); }

function storeStrip(){
  return `<div class="store-strip-wrap"><div class="store-strip">
    ${STORES.map(s=>`<div class="store-pill${s.id===SEL?' active':''}" onclick="SEL='${s.id}';render();">${s.id} - ${s.name}</div>`).join('')}
  </div></div>`;
}

// ── OVERVIEW ───────────────────────────────────────────────────────────────
function renderOverview(){
  const stores = STORES.map(s=>WASTE_DATA[s.id]).filter(Boolean);
  const totYestGal = stores.reduce((a,s)=>a+(s.wastYestGal||0),0);
  const totL7Gal   = stores.reduce((a,s)=>a+(s.wastL7Gal||0),0);
  const totL30Gal  = stores.reduce((a,s)=>a+(s.wastL30Gal||0),0);
  const totYestJug = stores.reduce((a,s)=>a+(s.wastYestJug||0),0);
  const totL7Jug   = stores.reduce((a,s)=>a+(s.wastL7Jug||0),0);
  const totL30Jug  = stores.reduce((a,s)=>a+(s.wastL30Jug||0),0);
  const valid = stores.filter(s=>s.cogsAffect!==null);
  const avgCOGS = valid.reduce((a,s)=>a+s.cogsAffect,0)/valid.length;
  const above = valid.filter(s=>s.cogsAffect>0.0025);
  const flagged = above.filter(s=>s.cogsAffect>0.004).sort((a,b)=>b.cogsAffect-a.cogsAffect);
  const warn    = above.filter(s=>s.cogsAffect<=0.004).sort((a,b)=>b.cogsAffect-a.cogsAffect);

  return `<div class="section">
    <div class="card">
      <div class="card-hdr"><div class="card-title">Gallons Wasted</div></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val">${fN(totYestGal)}</div><div class="stat-lbl">Yesterday</div></div>
        <div class="stat"><div class="stat-val">${fN(totL7Gal)}</div><div class="stat-lbl">Last 7 Days</div></div>
        <div class="stat"><div class="stat-val">${fN(totL30Gal)}</div><div class="stat-lbl">Last 30 Days</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">2.5 Gal Jugs Wasted</div></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val">${fN(totYestJug)}</div><div class="stat-lbl">Yesterday</div></div>
        <div class="stat"><div class="stat-val">${fN(totL7Jug)}</div><div class="stat-lbl">Last 7 Days</div></div>
        <div class="stat"><div class="stat-val">${fN(totL30Jug)}</div><div class="stat-lbl">Last 30 Days</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">Waste COGS Impact</div><div style="font-size:10px;color:var(--muted)">Target &lt; 0.25%</div></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val" style="color:${vc(avgCOGS)}">${fP(avgCOGS)}</div><div class="stat-lbl">Avg COGS %</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--green)">${valid.length-above.length}</div><div class="stat-lbl">At Target</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red)">${above.length}</div><div class="stat-lbl">Above Target</div></div>
      </div>
    </div>
    ${flagged.length?`<div class="card" style="border-color:rgba(248,113,113,0.3)">
      <div class="card-hdr"><div class="card-title" style="color:var(--red)">🚨 Needs Attention</div></div>
      <div>${flagged.map(s=>`<div class="tbl-row"><div class="tbl-store">${s.id||''} - ${s.name}</div><div style="font-size:13px;font-weight:800;color:var(--red)">${fP(s.cogsAffect)}</div></div>`).join('')}</div>
    </div>`:''}
    ${warn.length?`<div class="card" style="border-color:rgba(251,191,36,0.3)">
      <div class="card-hdr"><div class="card-title" style="color:var(--yellow)">⚠ Watch List</div></div>
      <div>${warn.map(s=>`<div class="tbl-row"><div class="tbl-store">${s.id||''} - ${s.name}</div><div style="font-size:13px;font-weight:800;color:var(--yellow)">${fP(s.cogsAffect)}</div></div>`).join('')}</div>
    </div>`:''}
  </div>`;
}

// ── WASTE ────────────────────────────────────────────────────────────────
let WASTE_PERIOD = 'L7';   // Yesterday | L7 | L14 | L30
let WASTE_STORES_OPEN = false;

const GAL_COST = 1.75;
const JUG_COST = 2.25;
const BASE_SALES = 16143686; // from summary tab

function getWasteForPeriod(store, period) {
  // Returns {gal, jug} for the selected period
  switch(period) {
    case 'Yesterday': return { gal: store.wastYestGal||0, jug: store.wastYestJug||0 };
    case 'L7':        return { gal: store.wastL7Gal||0,   jug: store.wastL7Jug||0   };
    case 'L14':       return { gal: (store.wastL30Gal||0)/2, jug: (store.wastL30Jug||0)/2 };
    case 'L30':       return { gal: store.wastL30Gal||0,  jug: store.wastL30Jug||0  };
    default:          return { gal: 0, jug: 0 };
  }
}

function renderWaste(){
  const stores = STORES.map(s => ({...WASTE_DATA[s.id], id:s.id})).filter(Boolean);
  const period = WASTE_PERIOD;

  // Consolidated totals
  let totGal=0, totJug=0;
  stores.forEach(s => {
    const w = getWasteForPeriod(s, period);
    totGal += w.gal;
    totJug += w.jug;
  });
  const totSnacks   = 0; // developer to add
  const galDollars  = totGal * GAL_COST;
  const jugDollars  = totJug * JUG_COST;
  const totalDollars= galDollars + jugDollars + totSnacks;

  // COGS: use base sales adjusted for period
  const periodDays = {Yesterday:1, L7:7, L14:14, L30:30};
  const days = periodDays[period];
  const periodSales = BASE_SALES / 365 * days;
  const cogsAffect  = periodSales > 0 ? totalDollars / periodSales : 0;

  // Period buttons
  const periods = ['Yesterday','L7','L14','L30'];
  const btns = periods.map(p => `<button onclick="WASTE_PERIOD='${p}';render();"
    style="flex:1;padding:9px 4px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;box-sizing:border-box;
    border:1px solid ${p===period?'rgba(56,189,248,0.5)':'rgba(255,255,255,0.1)'};
    background:${p===period?'rgba(56,189,248,0.18)':'rgba(255,255,255,0.03)'};
    color:${p===period?'#38bdf8':'#64748b'}">${p}</button>`).join('');

  // 4 summary cards
  function card(icon, label, units, dollars) {
    const showUnits = units !== null;
    return `<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:0">
        <!-- Left: label -->
        <div style="flex:1.2">
          <div style="font-size:15px;font-weight:800;color:var(--text);line-height:1">${label}</div>
        </div>
        <!-- Middle: units -->
        <div style="flex:1;text-align:center;border-left:1px solid var(--border);padding-left:12px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">Units</div>
          <div style="font-size:22px;font-weight:800;line-height:1;color:${showUnits?'var(--text)':'var(--dim)'}">${showUnits?(typeof units==='number'?Math.round(units).toLocaleString():units):'—'}</div>
        </div>
        <!-- Right: wasted $ -->
        <div style="flex:1;text-align:center;border-left:1px solid var(--border);padding-left:12px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">Wasted</div>
          <div style="font-size:22px;font-weight:800;line-height:1;color:var(--yellow)">$${Math.round(dollars).toLocaleString()}</div>
        </div>
      </div>
    </div>`;
  }

  const cogsColor = cogsAffect<=0.0025?'var(--green)':cogsAffect<=0.004?'var(--yellow)':'var(--red)';
  const totalCard = `<div style="background:rgba(56,189,248,0.07);border-radius:12px;border:1px solid rgba(56,189,248,0.25);padding:16px 16px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:0">
      <!-- Left: label -->
      <div style="flex:1.2">
        <div style="font-size:15px;font-weight:800;color:var(--sky);line-height:1">Total Waste</div>
      </div>
      <!-- Middle: total dollars -->
      <div style="flex:1;text-align:center;border-left:1px solid rgba(56,189,248,0.2);padding-left:12px">
        <div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">Wasted</div>
        <div style="font-size:22px;font-weight:800;line-height:1;color:var(--yellow)">$${Math.round(totalDollars).toLocaleString()}</div>
      </div>
      <!-- Right: COGS -->
      <div style="flex:1;text-align:center;border-left:1px solid rgba(56,189,248,0.2);padding-left:12px">
        <div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">COGS</div>
        <div style="font-size:22px;font-weight:800;line-height:1;color:${cogsColor}">${(cogsAffect*100).toFixed(2)}%</div>
      </div>
    </div>
  </div>`;

  // Store drill-down
  const storeRows = stores.map(s => {
    const w = getWasteForPeriod(s, period);
    const gDol = w.gal * GAL_COST;
    const jDol = w.jug * JUG_COST;
    const tot  = gDol + jDol;
    const cogsA= periodSales > 0 ? (tot / (periodSales/stores.length)) : 0;
    const cc   = cogsA<=0.0025?'var(--green)':cogsA<=0.004?'var(--yellow)':'var(--red)';
    const hasWaste = tot > 0;
    return `<div style="border-bottom:1px solid rgba(255,255,255,0.04)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px">
        <div style="font-size:12px;font-weight:600;flex:1.5;color:${hasWaste?'var(--text)':'var(--muted)'}">${s.id} - ${s.name}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <div style="text-align:right">
            <div style="font-size:9px;color:var(--muted)">Gal</div>
            <div style="font-size:11px;font-weight:700">${w.gal>0?Math.round(w.gal).toLocaleString():'—'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:9px;color:var(--muted)">Jugs</div>
            <div style="font-size:11px;font-weight:700">${w.jug>0?Math.round(w.jug).toLocaleString():'—'}</div>
          </div>
          <div style="text-align:right;min-width:56px">
            <div style="font-size:9px;color:var(--muted)">$Waste</div>
            <div style="font-size:12px;font-weight:800;color:${hasWaste?'var(--yellow)':'var(--dim)'}">${tot>0?'$'+Math.round(tot).toLocaleString():'—'}</div>
          </div>
          <div style="text-align:right;min-width:48px">
            <div style="font-size:9px;color:var(--muted)">COGS</div>
            <div style="font-size:12px;font-weight:800;color:${cc}">${(cogsA*100).toFixed(2)}%</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const drillDown = `<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden">
    <div onclick="WASTE_STORES_OPEN=!WASTE_STORES_OPEN;render();"
      style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer">
      <div style="font-size:10px;font-weight:700;color:var(--sky);letter-spacing:.08em;text-transform:uppercase">▾ Store Breakdown</div>
      <div style="font-size:11px;color:var(--dim)">${WASTE_STORES_OPEN?'▲':'▼'}</div>
    </div>
    ${WASTE_STORES_OPEN?`
    <div style="border-top:1px solid var(--border)">
      <div style="display:flex;justify-content:flex-end;padding:5px 14px;border-bottom:1px solid var(--border);gap:6px">
        <div style="font-size:9px;color:var(--muted);font-weight:700;min-width:36px;text-align:right">Gal</div>
        <div style="font-size:9px;color:var(--muted);font-weight:700;min-width:36px;text-align:right">Jugs</div>
        <div style="font-size:9px;color:var(--muted);font-weight:700;min-width:56px;text-align:right">$Waste</div>
        <div style="font-size:9px;color:var(--muted);font-weight:700;min-width:48px;text-align:right">COGS</div>
      </div>
      ${storeRows}
    </div>`:''}
  </div>`;

  return `<div class="section">
    <!-- Period selector -->
    <div style="display:flex;gap:6px;margin-bottom:12px">${btns}</div>

    <!-- 4 cards stacked -->
    ${card('🧊','Gallons', totGal, galDollars)}
    ${card('🫙','2.5g Jugs', totJug, jugDollars)}
    ${card('🍿','Snacks', null, totSnacks)}
    <div style="height:1px;background:rgba(255,255,255,0.08);margin:16px 0"></div>
    ${totalCard}
    <div style="height:1px;background:rgba(255,255,255,0.08);margin:16px 0"></div>

    <!-- Store drill-down -->
    ${drillDown}

    <div style="font-size:9px;color:var(--dim);text-align:center;margin-top:10px">
      Gal = $1.75/unit · Jug = $2.25/unit · L14 estimated (L30÷2) · Data as of 03/15/26
    </div>
  </div>`;
}

// ── GALLON BUILD PAR ───────────────────────────────────────────────────────
function renderGallon(){
  const dow = DOW;
  const dayName = DOW_NAMES[dow];
  const storePar = BUILD_PAR[SEL];

  const colHdr = `<div class="build-hdr">
    <span>Flavor</span>
    <span>Par</span>
    <span>Pre-HH<br>1PM 70%</span>
    <span>Post-HH<br>4PM 30%</span>
  </div>`;

  function makeRows(flavors){
    return Object.entries(flavors).map(([name,days])=>{
      const par  = days[dow]||0;
      const pre  = par>0 ? Math.round(par*0.7) : 0;
      const post = par>0 ? Math.max(1,Math.round(par*0.3)) : 0;
      const z    = par===0;
      return `<div class="build-row">
        <div class="build-name${z?' zero':''}">${name}</div>
        <div class="build-val${z?' zero':''}">${z?'—':par}</div>
        <div class="build-val${z?' zero':''}">${z?'—':pre}</div>
        <div class="build-val${z?' zero':''}">${z?'—':post}</div>
      </div>`;
    }).join('');
  }

  let content;
  if(!storePar){
    content = `<div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--yellow)">
      ⚠ Par data for this store has not been entered yet. Contact your developer to add this store's flavor par values.
    </div>`;
  } else {
    const allFlavors = [
      ...Object.values(storePar.sweets),
      ...Object.values(storePar.unsweets),
      ...Object.values(storePar.specialty),
    ];
    const totPar  = allFlavors.reduce((a,days)=>a+(days[dow]||0),0);
    const totPre  = Math.round(totPar*0.7);
    const totPost = Math.round(totPar*0.3);

    const totalRow = `<div class="build-total">
      <div class="build-total-lbl">TOTAL</div>
      <div class="build-total-val">${totPar}</div>
      <div class="build-total-val">${totPre}</div>
      <div class="build-total-val">${totPost}</div>
    </div>`;

    content = `<div class="card">
      <div style="background:var(--card)">
        <div style="padding:8px 14px 5px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:var(--sky);letter-spacing:.08em;text-transform:uppercase">Today — ${dayName}</div>
        </div>
        ${colHdr}
        ${totalRow}
      </div>
      <div class="section-lbl">Sweets</div>
      ${makeRows(storePar.sweets)}
      <div class="section-lbl">Un-Sweets</div>
      ${makeRows(storePar.unsweets)}
      <div class="section-lbl">Specialty</div>
      ${makeRows(storePar.specialty)}
    </div>`;
  }

  return `<div>
    <div id="gallon-store-strip" style="position:sticky;top:var(--hdr-h,97px);z-index:40;background:var(--bg);padding:0 0 6px;border-bottom:1px solid var(--border)">
      ${storeStrip()}
    </div>
    <div class="section" style="padding-top:8px">${content}</div>
  </div>`;
}

// ── JUGS IN ROTATION ───────────────────────────────────────────────────────
// Jug par data: Sun-Wed qty, Thu-Sat qty per flavor per store
// Using Yukon as template from screenshot; other stores use same structure
const JUG_PAR = {
  '01': { // Yukon — from screenshot
    sweets: {
      'Regular':       {sw:5, ts:6},
      'Georgia Peach': {sw:3, ts:4},
      'Blueberry':     {sw:3, ts:4},
      'Coconut':       {sw:3, ts:3},
      'Watermelon':    {sw:1, ts:2},
      'Raspberry':     {sw:2, ts:2},
      'Mint':          {sw:1, ts:2},
      'Peach Ginger':  {sw:1, ts:2},
    },
    unsweets: {
      'Regular':       {sw:3, ts:3},
      'Georgia Peach': {sw:2, ts:2},
      'Blueberry':     {sw:1, ts:2},
      'Coconut':       {sw:1, ts:2},
      'Watermelon':    {sw:1, ts:2},
      'Raspberry':     {sw:1, ts:2},
      'Mint':          {sw:1, ts:2},
      'Peach Ginger':  {sw:1, ts:2},
    },
    specialty: {
      'Strawberry Passion': {sw:1, ts:2},
      'Texas Chai':         {sw:3, ts:3},
      'Pink Lemonade':      {sw:1, ts:2},
      'Green - Sweet Almond':{sw:1, ts:2},
      'Green - Unsweet':    {sw:1, ts:2},
      'Mango Fresco':       {sw:1, ts:2},
      'Sweet Zero':         {sw:1, ts:2},
      'Ryan Palmer':        {sw:1, ts:2},
      'Decaf - Unsweet':    {sw:1, ts:1},
      'Cherry':             {sw:1, ts:2},
    },
  },
};

const MATRIX_PCTS = [1.50,1.75,2.00,2.25,2.50,2.75,3.00,3.25,3.50,3.75,4.00];
const TARGET_LOW  = 2.25;
const TARGET_HIGH = 2.75;

function renderJugs(){
  const jugData = JUG_PAR[SEL];
  const store   = STORES.find(s=>s.id===SEL);

  // ── Jug par table ───────────────────────────────────────────────────────
  let jugTable = '';
  let totalSW = 0, totalTS = 0;

  if (!jugData) {
    jugTable = `<div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--yellow)">
      ⚠ Jug par data for this store has not been entered yet.</div>`;
  } else {
    // Count totals
    ['sweets','unsweets','specialty'].forEach(sec => {
      Object.values(jugData[sec]).forEach(v => { totalSW+=v.sw; totalTS+=v.ts; });
    });

    function jugRows(flavors) {
      return Object.entries(flavors).map(([name,v]) => {
        const isEmpty = v.sw===0 && v.ts===0;
        return `<div style="display:grid;grid-template-columns:1fr 64px 64px;padding:5px 14px;border-bottom:1px solid rgba(255,255,255,0.03)">
          <div style="font-size:11px;${isEmpty?'color:var(--dim)':''}">${name}</div>
          <div style="text-align:center;font-size:12px;font-weight:700;${isEmpty?'color:var(--dim)':''}">${v.sw||'—'}</div>
          <div style="text-align:center;font-size:12px;font-weight:700;${isEmpty?'color:var(--dim)':''}">${v.ts||'—'}</div>
        </div>`;
      }).join('');
    }

    function sectionLabel(label) {
      return `<div style="font-size:9px;font-weight:800;color:var(--yellow);letter-spacing:.1em;text-transform:uppercase;padding:7px 14px 3px;background:rgba(251,191,36,0.04);border-top:1px solid var(--border)">${label}</div>`;
    }

    // Matrix calculation
    // Weekly jug value = (totalSW × 4) + (totalTS × 3)
    const weeklyVal = (totalSW * 4) + (totalTS * 3);
    // Each jug = 2.5 gallons → cost per jug = COGS × avg price
    // Matrix: weeklyVal ÷ pct% = implied weekly sales
    const matrixRows = MATRIX_PCTS.map(pct => {
      const impliedSales = weeklyVal / (pct/100);
      const isTarget = pct >= TARGET_LOW && pct <= TARGET_HIGH;
      const isLow    = pct < 2.00;
      const isHigh   = pct > 3.00;
      const color    = isTarget ? 'var(--green)' : isLow ? 'var(--red)' : isHigh ? 'var(--muted)' : 'var(--text)';
      const bg       = isTarget ? 'rgba(74,222,128,0.08)' : 'transparent';
      const border   = isTarget ? '1px solid rgba(74,222,128,0.2)' : '1px solid transparent';
      return `<div style="display:grid;grid-template-columns:52px 1fr;gap:4px;padding:4px 8px;background:${bg};border-radius:6px;border:${border};margin-bottom:2px">
        <div style="font-size:11px;font-weight:700;color:${color}">${pct.toFixed(2)}%</div>
        <div style="font-size:11px;font-weight:700;color:${color};text-align:right">$${Math.round(impliedSales).toLocaleString()}</div>
      </div>`;
    }).join('');

    jugTable = `
    <div style="display:flex;gap:10px;align-items:flex-start">

      <!-- Left: Jug par table -->
      <div class="card" style="flex:1;margin-bottom:0;min-width:0">
        <div style="display:grid;grid-template-columns:1fr 64px 64px;padding:7px 14px 5px;border-bottom:1px solid var(--border)">
          <div style="font-size:9px;color:var(--muted);font-weight:700">Flavor</div>
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-align:center">Sun–Wed</div>
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-align:center">Thu–Sat</div>
        </div>
        <!-- Total row -->
        <div style="display:grid;grid-template-columns:1fr 64px 64px;padding:6px 14px;background:rgba(56,189,248,0.07);border-bottom:1px solid rgba(56,189,248,0.2)">
          <div style="font-size:11px;font-weight:800;color:var(--sky)">Total Pars</div>
          <div style="text-align:center;font-size:13px;font-weight:800;color:var(--sky)">${totalSW}</div>
          <div style="text-align:center;font-size:13px;font-weight:800;color:var(--sky)">${totalTS}</div>
        </div>
        ${sectionLabel('Sweets')}${jugRows(jugData.sweets)}
        ${sectionLabel('Un-Sweets')}${jugRows(jugData.unsweets)}
        ${sectionLabel('Specialty')}${jugRows(jugData.specialty)}
      </div>

      <!-- Right: Matrix -->
      <div style="width:130px;flex-shrink:0">
        <div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;text-align:center">Sales Range</div>
        <div>${matrixRows}</div>
        <div style="font-size:8px;color:var(--dim);text-align:center;margin-top:8px">🟢 Target 2.25–2.75%</div>
      </div>

    </div>`;
  }

  return `<div>
    <div id="jugs-store-strip" style="position:sticky;top:var(--hdr-h,97px);z-index:40;background:var(--bg);padding:0 0 6px;border-bottom:1px solid var(--border)">
      ${storeStrip()}
    </div>
    <div class="section" style="padding-top:8px">${jugTable}</div>
  </div>`;
}

// ── Render ──────────────────────────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  if(MODE==='overview') app.innerHTML=renderWaste(); // overview removed
  else if(MODE==='waste')  app.innerHTML=renderWaste();
  else if(MODE==='gallon') app.innerHTML=renderGallon();
  else if(MODE==='jugs')   app.innerHTML=renderJugs();
  // Re-apply header height after DOM update
  setHdrHeight();
}

// ── Init ────────────────────────────────────────────────────────────────────
document.getElementById('as-of').textContent = 'Data as of 03/15/26';

// Measure actual header height and set CSS variable so store strips
// and inner sticky headers land exactly below the header on any device
function setHdrHeight(){
  const hdr = document.querySelector('.header');
  if(hdr){
    const h = hdr.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--hdr-h', h + 'px');
  }
}
setHdrHeight();
// Re-measure on resize (orientation change etc)
window.addEventListener('resize', setHdrHeight);
render();
</script>
</body>
</html>
